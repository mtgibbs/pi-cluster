# ===== jellyfin-video (READ-ONLY — this one bit us tonight) =====
apiVersion: batch/v1
kind: Job
metadata:
  name: preflight-jellyfin-video-ro
  namespace: default
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: probe
        image: alpine:3.19
        securityContext:
          privileged: true
        command: ["sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache nfs-utils >/dev/null
          # Critical test — kubelet adds 'ro' for readOnly:true PVs. This must work.
          mount -v -t nfs -o nolock,ro storage.lab.mtgibbs.dev:/cluster/media/video /mnt
          ls /mnt | head -3
          # No write test — it's readOnly
          umount /mnt
          echo "PREFLIGHT OK jellyfin-video (read-only mount)"
