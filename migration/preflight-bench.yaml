---
# QNAP NFS Pre-Flight Bench Test
#
# Spawns one test pod per future PV. Each pod mounts the EXACT path
# with the EXACT options that kubelet will use, writes + reads a test
# file, and reports OK or fails noisily.
#
# Apply BEFORE any production PV swap. Wait for all 8 jobs to Succeed.
# If ANY fail, fix the underlying issue before touching production PVs.
#
# Usage:
#   kubectl apply -f migration/preflight-bench.yaml
#   kubectl get jobs -n default | grep preflight
#   kubectl logs job/preflight-<name> -n default --tail=20
#   # All 8 must show "PREFLIGHT OK". If any FAIL, dig in before cutover.
#   # When done:
#   kubectl delete -f migration/preflight-bench.yaml

# ===== media-downloads =====
apiVersion: batch/v1
kind: Job
metadata:
  name: preflight-media-downloads
  namespace: default
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: probe
        image: alpine:3.19
        securityContext:
          privileged: true
        command: ["sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache nfs-utils >/dev/null
          echo "=== media-downloads: mount RW, nolock ==="
          mount -v -t nfs -o nolock storage.lab.mtgibbs.dev:/cluster/media/downloads /mnt
          echo "=== write test ==="
          F=/mnt/.preflight-$RANDOM
          echo data > "$F"
          cat "$F"
          rm "$F"
          umount /mnt
          echo "PREFLIGHT OK media-downloads"
