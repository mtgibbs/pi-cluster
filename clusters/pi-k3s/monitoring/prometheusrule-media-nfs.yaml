apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: media-nfs-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: media-nfs
    release: kube-prometheus  # Match Prometheus Operator selector
spec:
  groups:
    - name: media-nfs.rules
      rules:
        # PRIMARY DETECTOR — gates on node_procs_blocked (D-state count), the AUTHORITATIVE
        # real-I/O-hang signal. Discovered 2026-06-20: iowait% alone over-reads on a near-idle
        # node (per-CPU accounting "sticks" high after a stream stops), but procs_blocked is clean —
        # 30h history showed it sits at 0 baseline and spikes to 11–25 during EVERY real hang
        # (06-19 18:46/21:42/21:52, 06-20 21:44). Requiring procs_blocked>=4 AND high iowait
        # eliminates the idle-artifact false positive while keeping every real event. (Also corrected
        # a prior over-reaction: the hangs ARE real I/O stalls — procs_blocked proves it — NOT an
        # artifact; a single mistimed `ps` at the recovery edge misled us.)
        - alert: MediaNFSReadHang
          expr: |
            (max_over_time(node_procs_blocked[2m]) >= 4)
            and on (instance)
            (avg by (instance) (rate(node_cpu_seconds_total{mode="iowait"}[2m])) > 0.40)
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Real I/O hang on {{ $labels.instance }} — processes stuck in D-state + iowait pinned"
            description: >-
              {{ $labels.instance }} has processes stuck in uninterruptible D-state (procs_blocked>=4) AND
              iowait pinned — a GENUINE I/O hang (procs_blocked is the authoritative signal; iowait alone is
              noisy). This is the recurring Jellyfin streaming stall (Harvey, Bad Guys 2). Self-recovers in
              ~2–18 min. CAPTURE IT NOW, FAST (it self-clears) — the OPEN question is WHAT the blocked procs
              wait on (QNAP media-NFS vs other). On pi-k3s: `ps -eo state,pid,comm,wchan | awk '$1~/^D/'`
              (what's stuck + its wait-channel), `cat /proc/PID/stack` for a blocked pid, `nfsstat -m`,
              `grep -A40 cluster/media/video /proc/self/mountstats` (xprt backlog). On the QNAP (if SSH
              reachable): `iostat -x 2`, `cat /proc/net/rpc/nfsd`, `dmesg -T | tail`, `free`. The QNAP
              recorder cron (#1) logs this every minute so a mistimed manual probe no longer loses the event.

        # Legacy / coarse: iowait-only. KEPT as a wide net but DEPRECATED as a root-cause signal —
        # iowait% over-reads on an idle node (2026-06-20 finding). Trust MediaNFSReadHang (procs_blocked).
        - alert: NodeIOWaitSustained
          expr: |
            (avg by (instance) (rate(node_cpu_seconds_total{mode="iowait"}[5m])) > 0.30)
            and on (instance) (max_over_time(node_procs_blocked[5m]) >= 1)
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "Sustained iowait on {{ $labels.instance }} (corroborated by procs_blocked)"
            description: >-
              {{ $labels.instance }} >30% iowait for 5m WITH at least one blocked process (so not a pure
              idle-node artifact). Coarser/slower than MediaNFSReadHang; may also fire during the Sunday
              backup window (expected). For streaming stalls, MediaNFSReadHang is the precise signal.
