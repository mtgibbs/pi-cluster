apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-secret
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: grafana-secret
    creationPolicy: Owner
    template:
      data:
        admin-user: "admin"
        admin-password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: grafana/password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: alertmanager/discord-alerts-webhook-url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-healthchecks
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: alertmanager-healthchecks
    creationPolicy: Owner
  data:
    # The external dead-man's-switch ping URL (a healthchecks.io check URL).
    # 1Password item "healthchecks", field "watchdog-ping-url", vault pi-cluster.
    - secretKey: ping-url
      remoteRef:
        key: healthchecks/watchdog-ping-url
