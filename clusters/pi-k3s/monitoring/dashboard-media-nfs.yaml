apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-media-nfs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  media-nfs.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "Prometheus",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "showIn": 0,
            "type": "dashboard"
          }
        ]
      },
      "description": "Jellyfin/NFS streaming-stall attribution: iowait vs NIC receive throughput. High RX during an iowait spike = a greedy reader competing; low RX + high iowait = the QNAP RAID5 is the limit.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "panels": [],
          "title": "Media NFS / Streaming Health",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "description": "Per-node iowait. Normal streaming idles ~5%. A sustained spike >30% (alert: NodeIOWaitStall) on pi-k3s is the streaming-drop fingerprint.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line" }
              },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 30 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "legend": { "calcs": ["max", "lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "avg by (instance) (rate(node_cpu_seconds_total{mode=\"iowait\"}[5m])) * 100",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "title": "Node iowait %  (stall = sustained > 30%)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "description": "Per-node physical-NIC receive throughput = a proxy for total NFS READ throughput (NFS reads arrive as TCP bytes from the QNAP). Read TOGETHER with iowait: high RX during an iowait spike = a greedy reader; low RX + high iowait = the array is slow to serve.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "legend": { "calcs": ["max", "lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|cni.*|flannel.*|docker.*|tunl.*|dummy.*|kube.*|br.*\"}[5m]))",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "title": "Node NIC receive throughput  (NFS read proxy)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "description": "Jellyfin container working set + CPU, for context during a stall (alive-but-I/O-blocked shows as flat CPU, not a crash).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 10 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"jellyfin\", container!=\"\"})",
              "legendFormat": "jellyfin working set",
              "refId": "A"
            }
          ],
          "title": "Jellyfin working set (context)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["media", "nfs", "jellyfin", "storage"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Media NFS / Streaming Health",
      "uid": "media-nfs-health",
      "version": 1
    }
