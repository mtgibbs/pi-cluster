---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "80.6.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: alertmanager-discord
      valuesKey: webhook-url
      targetPath: alertmanager.config.receivers[0].discord_configs[0].webhook_url
    # Inject the healthchecks.io ping URL into the webhook receiver below.
    # receivers[2] is the 'healthchecks' receiver (order matters — it is the
    # third entry in alertmanager.config.receivers).
    - kind: Secret
      name: alertmanager-healthchecks
      valuesKey: ping-url
      targetPath: alertmanager.config.receivers[2].webhook_configs[0].url
  values:
    # Grafana settings
    grafana:
      admin:
        existingSecret: grafana-secret
        passwordKey: admin-password
      # Use Recreate strategy for RWO PVC compatibility
      deploymentStrategy:
        type: Recreate
      persistence:
        enabled: true
        size: 1Gi
        storageClassName: local-path
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      # ClusterIP for ingress access
      service:
        type: ClusterIP
        port: 3000
      # Configure for subdomain access
      grafana.ini:
        server:
          domain: "grafana.lab.mtgibbs.dev"
          root_url: "https://grafana.lab.mtgibbs.dev"
      # Additional datasources
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.log-aggregation.svc.cluster.local:3100
          access: proxy
          isDefault: false

    # Prometheus settings
    prometheus:
      prometheusSpec:
        # 2026-06-19: bumped from 7d/2GB. The 2GB size cap pruned to ~3 days, too short for
        # overnight job look-backs. 7GB ≈ ~10 days at the current scrape rate; size-capped well
        # under the 10Gi PVC (leaves compaction headroom). Growing the PVC needs an Operator
        # STS+PVC recreate (local-path has no in-place expansion) — see docs/flux-gitops.md if redone.
        retention: 21d
        retentionSize: 7GB
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi  # 2026-06-19: 5Gi→10Gi (on pi-k3s SD card, 21G free). local-path = no in-place resize; STS+PVC recreate required.
        # Scrape the Beelink AI box (outside the cluster) over the LAN.
        # node-exporter :9100 (host + GPU textfile metrics), cAdvisor :8081.
        additionalScrapeConfigs:
          - job_name: beelink-node
            static_configs:
              - targets: ['192.168.1.70:9100']
                labels:
                  instance: beelink
          - job_name: beelink-cadvisor
            static_configs:
              - targets: ['192.168.1.70:8081']
                labels:
                  instance: beelink
          # Custom LiteLLM usage exporter (OSS /spend API → Prometheus; native
          # /metrics is Enterprise-gated). Token throughput + latency per virtual key.
          - job_name: beelink-litellm
            static_configs:
              - targets: ['192.168.1.70:9101']
                labels:
                  instance: beelink

    # Alertmanager - send alerts to Discord
    alertmanager:
      enabled: true
      alertmanagerSpec:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['alertname', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: discord
          routes:
            # Watchdog is Prometheus's always-firing dead-man's-switch. Instead
            # of silencing it, route it to an EXTERNAL heartbeat: the webhook
            # receiver below POSTs to a healthchecks.io check on every send. As
            # long as the whole chain is alive (Prometheus evaluating rules ->
            # Alertmanager routing -> egress), the check keeps getting pinged.
            # If the cluster — or the whole house — goes dark, the pings stop
            # and healthchecks.io notifies out-of-band. This is the one alert
            # that can survive the cluster it is watching.
            #
            # repeat_interval is deliberately short so pings arrive frequently
            # relative to the external check's period+grace (set ~15m/10m on
            # the healthchecks.io side). group_wait small so the first ping
            # after a restart is prompt.
            - receiver: healthchecks
              matchers:
                - alertname = "Watchdog"
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 5m
            # Silence the expected memory-overcommit noise (this cluster runs
            # deliberately overcommitted).
            - receiver: 'null'
              matchers:
                - alertname = "KubeMemoryOvercommit"
            # Critical alerts get sent immediately
            - receiver: discord
              matchers:
                - severity = critical
              group_wait: 10s
              repeat_interval: 1h
        receivers:
          - name: discord
            discord_configs:
              - send_resolved: true
                title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
                message: |
                  {{ range .Alerts }}
                  **Status:** {{ .Status | toUpper }}
                  **Severity:** {{ .Labels.severity }}
                  **Description:** {{ .Annotations.description }}
                  {{ end }}
          - name: 'null'  # Silence receiver
          # External dead-man's-switch. url is injected at reconcile time from
          # the alertmanager-healthchecks secret (see valuesFrom above); it must
          # stay receivers[2] for that targetPath index to line up. A bare
          # webhook POST to a healthchecks.io check URL registers as a ping —
          # the body is ignored. send_resolved: false because Watchdog never
          # resolves (a resolve would only mean Prometheus itself stopped, at
          # which point Alertmanager sends nothing anyway).
          - name: healthchecks
            webhook_configs:
              - send_resolved: false
                url: "https://hc-ping.com/placeholder-overwritten-by-valuesFrom"

    # Node exporter - lightweight
    nodeExporter:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

    # Kube-state-metrics
    kubeStateMetrics:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

    # Prometheus operator
    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

    # Disable components not needed for single-node learning cluster
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false
