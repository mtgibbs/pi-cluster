apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare-tunnel
data:
  config.yaml: |
    # Tunnel ingress rules - GitOps managed
    # Add new routes here, commit, and Flux will deploy
    ingress:
      # Log drain for Heroku
      - hostname: logs.mtgibbs.dev
        service: http://vector.log-aggregation.svc.cluster.local:8080

      # n8n UI (n8n.mtgibbs.dev) is intentionally NOT exposed publicly anymore.
      # The editor is LAN-only via n8n.lab.mtgibbs.dev (nginx ingress). Any public
      # hit on n8n.mtgibbs.dev falls through to the catch-all 404 below.

      # n8n inbound-mail webhook (queue mode) -> dedicated webhook tier.
      # PATH-RESTRICTED: only the inbound-mail webhook is public. This is critical —
      # the webhook tier serves ALL n8n production webhooks (incl. future Family Board
      # endpoints), so without this filter they'd leak to the internet on this host.
      # Any other path on n8n-hook.mtgibbs.dev -> 404 (rule below).
      - hostname: n8n-hook.mtgibbs.dev
        path: ^/webhook/inbound-mail.*$
        service: http://n8n-webhook.n8n.svc.cluster.local:5678
      # Per-kid calendar ICS feeds (dynamic, served by MAIN n8n which registers
      # activations immediately). GUID-obscured paths; subscribed by family iPhones.
      - hostname: n8n-hook.mtgibbs.dev
        path: ^/webhook/cal-.*$
        service: http://n8n.n8n.svc.cluster.local:5678
      - hostname: n8n-hook.mtgibbs.dev
        service: http_status:404

      # Calendar - ICS feed for family calendar subscriptions
      - hostname: calendar.mtgibbs.dev
        service: http://calendar.calendar.svc.cluster.local:80

      # ntfy - self-hosted push notifications (auth: deny-all + family user)
      - hostname: ntfy.mtgibbs.dev
        service: http://ntfy.ntfy.svc.cluster.local:80

      # Personal site (uncomment when ready to migrate from Heroku)
      # - hostname: mtgibbs.xyz
      #   service: http://mtgibbs-site.mtgibbs-site.svc.cluster.local:3000
      # - hostname: www.mtgibbs.xyz
      #   service: http://mtgibbs-site.mtgibbs-site.svc.cluster.local:3000

      # Catch-all (required - returns 404 for unmatched requests)
      - service: http_status:404
