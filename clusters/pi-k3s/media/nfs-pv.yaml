apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-downloads-nfs
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-media-downloads
  # ReadWriteMany → keep `hard` (a `soft` timeout mid-write can corrupt; `soft` is only used on
  # the read-only jellyfin video PV). nconnect=4 + tuned timeo/retrans add throughput (big for
  # SAB writing large files) + resilience, without the corruption risk. Hostname kept — these
  # mount on the WORKERS (Pi-hole DNS), unlike jellyfin on pi-k3s. See media-services SKILL.
  mountOptions:
    - nolock
    - hard
    - timeo=600
    - retrans=2
    - nconnect=4
  nfs:
    server: storage.lab.mtgibbs.dev
    path: /cluster/media/downloads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-media-downloads
  resources:
    requests:
      storage: 500Gi
