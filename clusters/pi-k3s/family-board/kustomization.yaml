apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: family-board
resources:
  - namespace.yaml
  - external-secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
# Static files ship as hashed ConfigMaps: editing index.html changes the hash,
# which rolls the Deployment automatically — no annotation-bump "publish dance".
configMapGenerator:
  - name: family-board-site
    files:
      - index.html
      - manifest.webmanifest
      - icon.svg
  - name: family-board-nginx
    files:
      - nginx.conf.template
