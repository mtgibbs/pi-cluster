server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Kiosk health endpoint (readiness/liveness probes hit this).
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Correct MIME for the PWA manifest.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Static PWA — never cache the shell so a redeploy is picked up immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
