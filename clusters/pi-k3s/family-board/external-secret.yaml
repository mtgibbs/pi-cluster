apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: family-board-feed
  namespace: family-board
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: family-board-feed
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: n8n-automation/feed-token
