apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  labels:
    # Opt in to manual triggering via the MCP trigger_cronjob tool.
    # Renovate is idempotent (re-runs re-evaluate and dedupe branches) and
    # tolerates overlapping with a scheduled run.
    homelab.mcp/triggerable: "true"
spec:
  schedule: "0 6 * * 6"
  timeZone: America/Chicago
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              image: renovate/renovate:43
              envFrom:
                - secretRef:
                    name: renovate-secrets
              env:
                - name: RENOVATE_PLATFORM
                  value: github
                - name: RENOVATE_AUTODISCOVER
                  value: "false"
                - name: RENOVATE_REPOSITORIES
                  # beelink-ansible added 2026-07-09 for the coding-harness
                  # containers' pinned CLI versions (see its renovate.json).
                  # HUMAN GATE: the renovate/github-token PAT (fine-grained,
                  # op://pi-cluster/renovate/github-token) does NOT yet have
                  # beelink-ansible in its repository access list (confirmed:
                  # 200 on pi-cluster, 404 on beelink-ansible) — this entry is
                  # a no-op until that's added at
                  # https://github.com/settings/tokens?type=beta.
                  value: "[\"mtgibbs/pi-cluster\", \"mtgibbs/beelink-ansible\"]"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1
                  memory: 1Gi
