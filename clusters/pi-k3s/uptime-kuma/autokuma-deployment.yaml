apiVersion: apps/v1
kind: Deployment
metadata:
  name: autokuma
  namespace: uptime-kuma
  labels:
    app: autokuma
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: autokuma
  template:
    metadata:
      labels:
        app: autokuma
      annotations:
        # Bump to force a pod roll so the initContainer re-copies the updated
        # autokuma-monitors ConfigMap into /monitors. ConfigMap edits alone don't
        # restart the pod — the monitor files live in an emptyDir populated only at
        # startup. (TODO: switch to a direct ConfigMap mount + AUTOKUMA__ENV__ webhook
        # templating so AutoKuma's file-watcher auto-reloads without this dance.)
        mtgibbs.dev/monitors-revision: "2"
    spec:
      initContainers:
        - name: envsubst
          image: alpine:3.21
          env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-secret
                  key: discord-webhook-url
          command:
            - sh
            - -c
            - |
              for f in /configmap/*.json; do
                sed "s|\${DISCORD_WEBHOOK_URL}|${DISCORD_WEBHOOK_URL}|g" "$f" > "/monitors/$(basename $f)"
              done
          volumeMounts:
            - name: configmap
              mountPath: /configmap
            - name: monitors-processed
              mountPath: /monitors
      containers:
        - name: autokuma
          image: ghcr.io/bigboot/autokuma:2.0.0@sha256:8acbd3ad3ec8cb6c066aa0ee541154921283ec78159015937128541921c47974
          env:
            - name: AUTOKUMA__KUMA__URL
              value: "http://uptime-kuma:3001"
            - name: AUTOKUMA__KUMA__USERNAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-secret
                  key: username
            - name: AUTOKUMA__KUMA__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-secret
                  key: password
            - name: AUTOKUMA__STATIC_MONITORS
              value: "/monitors"
            - name: AUTOKUMA__TAG_NAME
              value: "AutoKuma"
            # KEEP, not delete. After the v2 migration + notification attach, AutoKuma
            # 2.0.0 flapped (delete-then-recreate every sync). "keep" makes the delete
            # half non-destructive so the churn can't tear monitors down. Acceptable
            # trade: a monitor removed from the ConfigMap won't auto-prune from Kuma.
            - name: AUTOKUMA__ON_DELETE
              value: "keep"
            - name: AUTOKUMA__DOCKER__ENABLED
              value: "false"
            - name: AUTOKUMA__FILES__FOLLOW_SYMLINKS
              value: "true"
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-secret
                  key: discord-webhook-url
          volumeMounts:
            - name: monitors-processed
              mountPath: /monitors
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: configmap
          configMap:
            name: autokuma-monitors
        - name: monitors-processed
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: autokuma-data
