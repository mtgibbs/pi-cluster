apiVersion: v1
kind: ConfigMap
metadata:
  name: autokuma-monitors
  namespace: uptime-kuma
data:
  # Discord notification (AutoKuma v2 notification entity). The file stem is the
  # autokuma id "discord"; monitors opt in via "notification_name_list": ["discord"].
  # AutoKuma does NOT honor isDefault (per its docs), so each monitor must list the
  # id explicitly to alert. ${DISCORD_WEBHOOK_URL} is injected by the initContainer.
  # (The old "__notification_" prefix made AutoKuma 2.0.0 skip this file silently.)
  discord.json: |
    {
      "type": "notification",
      "name": "Discord Alerts",
      "active": true,
      "isDefault": true,
      "config": {
        "type": "discord",
        "discordWebhookUrl": "${DISCORD_WEBHOOK_URL}",
        "discordUsername": "Uptime Kuma"
      }
    }
  # Each file is a separate monitor - filename (without .json) becomes the monitor ID
  pihole-dns.json: |
    {
      "notification_name_list": ["discord"],
      "type": "port",
      "name": "Pi-hole DNS",
      "hostname": "192.168.1.55",
      "port": 53,
      "interval": 60,
      "retryInterval": 30,
      "maxretries": 3
    }
  pihole-admin.json: |
