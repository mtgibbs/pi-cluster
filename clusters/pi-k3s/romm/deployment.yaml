apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm
  namespace: romm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: romm
  template:
    metadata:
      labels:
        app: romm
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi5-worker-1
                      - pi5-worker-2
      containers:
        - name: romm
          image: rommapp/romm:4.9.2
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: romm-mariadb
            - name: DB_NAME
              value: romm
            - name: DB_USER
              value: romm
            - name: HASHEOUS_API_ENABLED
              value: "true"
            - name: DB_PASSWD
              valueFrom:
                secretKeyRef:
                  name: romm-secret
                  key: DB_PASSWD
            - name: ROMM_AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: romm-secret
                  key: ROMM_AUTH_SECRET_KEY
          volumeMounts:
            - name: games
              mountPath: /romm/library
              subPath: library
            - name: games
              mountPath: /romm/assets
              subPath: assets
            - name: games
              mountPath: /romm/resources
              subPath: resources
            - name: config
              mountPath: /romm/config
            - name: redis-data
              mountPath: /redis-data
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 1500m
              memory: 1536Mi
          startupProbe:
            httpGet:
              path: /api/heartbeat
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/heartbeat
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/heartbeat
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
      volumes:
        - name: games
          persistentVolumeClaim:
            claimName: romm-games
        - name: config
          persistentVolumeClaim:
            claimName: romm-config
        - name: redis-data
          persistentVolumeClaim:
            claimName: romm-redis-data
