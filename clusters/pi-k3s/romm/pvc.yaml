apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-config
  namespace: romm
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled # Flux won't delete -> protects data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-redis-data
  namespace: romm
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled # Flux won't delete -> protects data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
