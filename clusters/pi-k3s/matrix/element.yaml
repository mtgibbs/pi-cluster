apiVersion: v1
kind: ConfigMap
metadata:
  name: element-config
  namespace: matrix
data:
  config.json: |
    { "default_server_config": { "m.homeserver": {
        "base_url": "https://matrix.lab.mtgibbs.dev", "server_name": "matrix.lab.mtgibbs.dev" } },
      "disable_guests": true, "disable_3pid_login": true }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: element-web
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: element-web
  template:
    metadata:
      labels:
        app: element-web
    spec:
      nodeSelector:
        kubernetes.io/hostname: pi5-worker-2
      containers:
        - name: element-web
          image: vectorim/element-web:v1.12.23
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: 16Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
      volumes:
        - name: config
          configMap:
            name: element-config
---
apiVersion: v1
kind: Service
metadata:
  name: element
  namespace: matrix
spec:
  selector:
    app: element-web
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP