apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: matrix-secret
  namespace: matrix
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: matrix-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # scalar for the postgres container's POSTGRES_PASSWORD env
        POSTGRES_PASSWORD: "{{ .dbpassword }}"
        # Synapse secret fragment — merged as Synapse's 2nd --config-path so secrets never
        # touch the ConfigMap. The FULL database block lives here (not split across files) so
        # Synapse's top-level config overlay can't drop user/host when merging over the base.
        # secretKeys are non-hyphenated (dbpassword, ...) because Go-template field access
        # `{{ .db-password }}` is INVALID (hyphen = minus). Synapse keys are exact:
        # macaroon_secret_key, database.args.password.
        homeserver-secrets.yaml: |
          database:
            name: psycopg2
            args:
              user: synapse
              password: "{{ .dbpassword }}"
              database: synapse
              host: matrix-postgresql
              cp_min: 5
              cp_max: 10
          registration_shared_secret: "{{ .regsecret }}"
          macaroon_secret_key: "{{ .macaroon }}"
          form_secret: "{{ .formsecret }}"
  data:
    - secretKey: dbpassword
      remoteRef:
        key: matrix/db-password
    - secretKey: regsecret
      remoteRef:
        key: matrix/registration-shared-secret
    - secretKey: macaroon
      remoteRef:
        key: matrix/macaroon-secret
    - secretKey: formsecret
      remoteRef:
        key: matrix/form-secret
