apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: local-llm-mcp-secrets
  namespace: local-llm-mcp
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: local-llm-mcp-secrets
    creationPolicy: Owner
  data:
    # Bearer token clients send as X-API-Key / Authorization: Bearer to hit /mcp.
    - secretKey: mcp-api-key
      remoteRef:
        key: local-llm-mcp/password
    # LiteLLM virtual key (scoped to allowed chat/embed models only).
    - secretKey: litellm-api-key
      remoteRef:
        key: local-llm-mcp/litellm-key
