# NFS PV/PVC capacity is metadata only — NFS doesn't enforce a quota.
# Actual ceiling is QNAP free space (11+ TiB at provisioning). Don't try
# to resize the PVC — the nfs-kiwix StorageClass doesn't support it.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kiwix-zim-nfs
spec:
  capacity:
    storage: 250Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-kiwix
  # Read-only NFS resilience (matches jellyfin-video-nfs; added 2026-06-18, was bare `nolock`).
  # `soft` makes a NAS read-stall error-and-recover instead of a `hard` mount hanging "still trying"
  # forever; `timeo=150` (15s) fails fast so a stall is a blip not a multi-minute freeze; `nconnect=4`
  # = throughput + resilience to a single-connection stall. Read-only data → `soft` is safe (no writes).
  mountOptions:
    - nolock
    - soft
    - timeo=150
    - retrans=2
    - nconnect=4
  nfs:
    server: storage.lab.mtgibbs.dev
    path: /cluster/kiwix/zim
    readOnly: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiwix-zim
  namespace: kiwix
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: nfs-kiwix
  resources:
    requests:
      storage: 250Gi
