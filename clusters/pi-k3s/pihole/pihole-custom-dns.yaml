apiVersion: v1
kind: ConfigMap
metadata:
  name: pihole-custom-dns
  namespace: pihole
data:
  # Wildcard DNS for home lab services
  # All *.lab.mtgibbs.dev resolves to the Pi (ingress controller)
  # Specific overrides below the wildcard (dnsmasq is most-specific-match-wins).
  02-local-dns.conf: |
    address=/lab.mtgibbs.dev/192.168.1.55
    # NAS direct (NFS/SSH) — points at QNAP after cutover (was Synology .60)
    address=/storage.lab.mtgibbs.dev/192.168.1.61
    # QNAP admin UI — via cluster ingress for TLS termination + LE cert
    # qnap.lab → ingress (.55), backed by Endpoints in external-services/qnap.yaml
    # Wildcard already routes *.lab → .55, but explicit entry documents intent.
    address=/qnap.lab.mtgibbs.dev/192.168.1.55
    # QNAP appliance direct (MCP and other raw protocols) — hardware-pinned
    address=/qnap-mcp.lab.mtgibbs.dev/192.168.1.61
  # Block AAAA (IPv6) for domains with broken/slow IPv6 routing
  # Returns :: (null IPv6) so clients immediately fall back to IPv4
  # See: docs/known-issues.md for AT&T IPv6 routing problems
  03-ipv6-overrides.conf: |
    # Amazon - returns 503 via IPv6
    address=/amazon.com/::
    address=/amazon.co.uk/::
    address=/amazonaws.com/::
    address=/cloudfront.net/::
    # MyFitnessPal - 3x slower via IPv6
    address=/myfitnesspal.com/::
    # Netflix - 5x slower via IPv6
    address=/netflix.com/::
    address=/nflxvideo.net/::
    address=/nflxso.net/::
    # Slack - connectivity issues via IPv6
    address=/slack.com/::
    address=/slack-edge.com/::
    address=/slack-imgs.com/::
    address=/slack-files.com/::
    # HBO Max (legacy domain) - times out via IPv6
    address=/hbomax.com/::
