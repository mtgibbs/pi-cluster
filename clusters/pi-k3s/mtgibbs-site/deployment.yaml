apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtgibbs-site
  namespace: mtgibbs-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mtgibbs-site
  template:
    metadata:
      labels:
        app: mtgibbs-site
    spec:
      # NOTE: previously had nodeAffinity preferring pi3-worker-2 (1GB Pi 3) — removed
      # 2026-05-24. A Next.js runtime is NOT lightweight (it OOM-thrashed there, 50
      # restarts). The Pi 3 is now batch-only (tainted role=batch:NoSchedule); this
      # serving app belongs on the 8GB Pi 5s.
      # See docs/incidents/2026-05-24-pi3-worker-2-overload.md.
      containers:
        - name: mtgibbs-site
          image: ghcr.io/mtgibbs/mtgibbs.xyz:20260709154535 # {"$imagepolicy": "flux-system:mtgibbs-site"}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: mtgibbs-spotify
                optional: true
            - secretRef:
                name: mtgibbs-github
                optional: true
            - secretRef:
                name: mtgibbs-tracking
                optional: true
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
