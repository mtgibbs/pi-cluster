apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: log-aggregation
  labels:
    app: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      # Avoid pi3-worker-2 (limited memory)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi5-worker-1
                      - pi5-worker-2
      containers:
        - name: vector
          image: timberio/vector:0.56.0-alpine
          args:
            - --config-dir
            - /etc/vector
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 5514
              name: syslog
              protocol: UDP
          env:
            # ntfy publish creds (family user) for the DNS-bypass push sink.
            # optional: Vector still starts if the secret hasn't synced yet.
            - name: NTFY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vector-ntfy
                  key: FAMILY_PASSWORD
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/vector
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: vector-config
---
apiVersion: v1
kind: Service
metadata:
  name: vector
  namespace: log-aggregation
spec:
  selector:
    app: vector
  ports:
    - port: 8080
      targetPort: http
      name: http
---
# LAN-reachable syslog ingestion for the UDM Pro Max remote-logging target.
# UDM remote syslog -> <any-node-IP>:30514/udp -> Vector :5514.
apiVersion: v1
kind: Service
metadata:
  name: vector-syslog
  namespace: log-aggregation
spec:
  type: NodePort
  selector:
    app: vector
  ports:
    - port: 5514
      targetPort: syslog
      nodePort: 30514
      protocol: UDP
      name: syslog
