apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vector-ntfy
  namespace: log-aggregation
spec:
  # Same shared 'family' ntfy password the ntfy server seeds and n8n publishes with.
  # Vector uses it (basic auth) to POST DNS-bypass alerts to the 'dns-bypass' topic.
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: vector-ntfy
    creationPolicy: Owner
  data:
    - secretKey: FAMILY_PASSWORD
      remoteRef:
        key: ntfy/family-password
