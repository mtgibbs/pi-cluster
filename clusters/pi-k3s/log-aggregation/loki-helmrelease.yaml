apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 24h
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: log-aggregation
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: "6.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    # Single binary mode for small clusters
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      # Retention settings
      #
      # retention_period ALONE DOES NOTHING. In Loki, deletion is performed by
      # the compactor, and the compactor only enforces retention when
      # retention_enabled is true. Without the block below, retention_period is
      # inert config: it reads like a 7-day cap while chunks accumulate forever.
      #
      # That was the live state until this commit — the rendered ConfigMap had
      # retention_period: 168h and no compactor: block at all. Loki has been
      # retaining every log line since it was deployed.
      #
      # This matters more than it sounds: loki is pinned to pi5-worker-2 with a
      # local-path PVC, and local-path does NOT enforce the 10Gi request. Loki
      # can consume the whole node filesystem (125.5 GB, 64.1 GB free at time of
      # writing). pi5-worker-2 also runs ingress-nginx, a CoreDNS replica,
      # prometheus, the n8n stack, Synapse and the Tailscale exit node, so
      # DiskPressure eviction there is a multi-service outage, not a logging
      # inconvenience.
      limits_config:
        retention_period: 168h  # 7 days

      # delete_request_store is REQUIRED when retention_enabled is true on
      # Loki 3.x — the binary refuses to start without it. Matches the
      # filesystem object store configured above.
      compactor:
        working_directory: /var/loki/compactor   # under common.path_prefix, on the PVC
        retention_enabled: true
        delete_request_store: filesystem

    # Single binary deployment
    singleBinary:
      replicas: 1
      nodeSelector:
        kubernetes.io/hostname: pi5-worker-2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      persistence:
        enabled: true
        size: 10Gi
        storageClass: local-path

    # Disable distributed components (not needed for single binary)
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    # Disable gateway (access Loki directly)
    gateway:
      enabled: false

    # Disable caching (reduces memory usage on resource-constrained cluster)
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Disable monitoring for now (reduces resource usage)
    monitoring:
      selfMonitoring:
        enabled: false
      lokiCanary:
        enabled: false

    # Disable test pod
    test:
      enabled: false
