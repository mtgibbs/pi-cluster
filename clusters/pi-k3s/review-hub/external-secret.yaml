apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: review-hub-secrets
  namespace: review-hub
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: review-hub-secrets
    creationPolicy: Owner
  data:
    # GitHub App identity (one App, installed on all repos; mints per-repo tokens).
    - secretKey: app-id
      remoteRef:
        key: review-hub/app-id
    - secretKey: private-key
      remoteRef:
        key: review-hub/private-key
    # HMAC secret GitHub signs webhook deliveries with.
    - secretKey: webhook-secret
      remoteRef:
        key: review-hub/webhook-secret
    # LiteLLM virtual key for the judge (scoped to coder models on the Beelink).
    - secretKey: litellm-key
      remoteRef:
        key: review-hub/litellm-key
