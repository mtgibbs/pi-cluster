apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
  namespace: n8n
  labels:
    app: n8n-worker
spec:
  # START SMALL: 1 worker so we don't crash the Pi 5 boxes. Scale replicas up
  # once Grafana shows RAM headroom under the flood test.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n-worker
  template:
    metadata:
      labels:
        app: n8n-worker
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi5-worker-1
                      - pi5-worker-2
      containers:
        - name: n8n-worker
          image: n8nio/n8n:latest
          # WORKER tier: pulls jobs off the queue and executes workflows.
          # --concurrency = max parallel jobs in THIS worker. Start gentle (3) so
          # we don't fire parallel inference at the single-GPU Beelink. Tune here.
          args: ["worker", "--concurrency=3"]
          ports:
            - containerPort: 5678
              name: http
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secret
          volumeMounts:
            # Workers are stateless (state in Postgres/Valkey/R2) — ephemeral home dir.
            - name: n8n-home
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: n8n-home
          emptyDir: {}
