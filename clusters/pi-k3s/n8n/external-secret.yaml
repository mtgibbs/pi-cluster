apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secret
  namespace: n8n
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: n8n-secret
    creationPolicy: Owner
  data:
    # Encryption key for credentials stored in n8n
    # CRITICAL: Back this up - losing it means losing access to all stored credentials
    - secretKey: N8N_ENCRYPTION_KEY
      remoteRef:
        key: n8n/encryption-key
    # Postgres password (queue mode) - consumed by both the n8n tiers and the n8n-postgresql pod
    - secretKey: DB_POSTGRESDB_PASSWORD
      remoteRef:
        key: n8n/db-password
    # Shared secret for the inbound-mail webhook (Header Auth: x-auth-token).
    # The Cloudflare Email Worker sends this exact value; the n8n webhook credential validates it.
    - secretKey: N8N_WEBHOOK_TOKEN
      remoteRef:
        key: n8n/webhook-token
    # R2 (S3-compatible) credentials for n8n's binary-data backend in queue mode.
    # Wired in the queue-mode conversion PR once the R2 keys exist in 1Password.
    # - secretKey: R2_ACCESS_KEY_ID
    #   remoteRef:
    #     key: n8n/r2-access-key-id
    # - secretKey: R2_SECRET_ACCESS_KEY
    #   remoteRef:
    #     key: n8n/r2-secret-access-key
