apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      # n8n runs as 'node' user (UID 1000) internally.
      # Prefer Pi 5 workers (8GB); the 1GB Pi 3 is excluded by its batch-only taint.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi5-worker-1
                      - pi5-worker-2
      containers:
        - name: n8n
          image: n8nio/n8n:2.23.4
          # MAIN tier: serves the editor UI, registers webhooks, runs the queue/scheduler.
          # No args == default `n8n` (main) process.
          ports:
            - containerPort: 5678
              name: http
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secret
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
            # Legacy ICS share (currently empty/parked; Radicale will supersede it).
            - name: calendar
              mountPath: /calendar
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
        - name: calendar
          persistentVolumeClaim:
            claimName: n8n-calendar
