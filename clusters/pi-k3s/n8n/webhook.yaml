apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-webhook
  namespace: n8n
  labels:
    app: n8n-webhook
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n-webhook
  template:
    metadata:
      labels:
        app: n8n-webhook
      annotations:
        # Bump this to roll the webhook tier so it re-registers active production
        # webhooks at startup (n8n doesn't reliably propagate activations to webhook
        # pods dynamically). Treat a publish as a deployment: drain/quiesce, then bump.
        n8n.mtgibbs.dev/restarted-at: "2026-05-27T17:30:00Z"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi5-worker-1
                      - pi5-worker-2
      containers:
        - name: n8n-webhook
          image: n8nio/n8n:latest
          # WEBHOOK tier: catches inbound webhook requests, enqueues, returns 200 fast.
          # This is the public-facing surface (via the tunnel, path-restricted).
          args: ["webhook"]
          ports:
            - containerPort: 5678
              name: http
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secret
          volumeMounts:
            - name: n8n-home
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: n8n-home
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-webhook
  namespace: n8n
  labels:
    app: n8n-webhook
    n8n-metrics: "true"
spec:
  selector:
    app: n8n-webhook
  ports:
    - port: 5678
      targetPort: 5678
      name: http
