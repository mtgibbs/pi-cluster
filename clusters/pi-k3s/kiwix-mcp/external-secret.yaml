apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiwix-mcp-secrets
  namespace: kiwix-mcp
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kiwix-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: mcp-api-key
      remoteRef:
        key: kiwix-mcp/password
