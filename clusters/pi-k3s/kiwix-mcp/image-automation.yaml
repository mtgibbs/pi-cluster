---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: kiwix-mcp
  namespace: flux-system
spec:
  image: ghcr.io/mtgibbs/kiwix-mcp
  interval: 5m0s
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: kiwix-mcp
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: kiwix-mcp
  filterTags:
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
  policy:
    semver:
      range: ">=0.1.0"
