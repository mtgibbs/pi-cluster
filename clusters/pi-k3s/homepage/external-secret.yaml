---
# Pi-hole API key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-pihole
  namespace: homepage
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: homepage-pihole
    creationPolicy: Owner
  data:
    - secretKey: HOMEPAGE_VAR_PIHOLE_API_KEY
      remoteRef:
        key: pihole/api-key
---
