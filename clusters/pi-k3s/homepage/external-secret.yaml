---
# Servarr API keys for the Homepage *arr widgets (sonarr/radarr/lidarr/prowlarr/sabnzbd/bazarr).
# qBittorrent + Jellyseerr are link-only (no widget) so they need no key here.
# NOTE: Bazarr's key lives at mcp-homelab/bazarr-api-key, NOT bazarr.lab.mtgibbs.dev — a
# known vault exception (provisioned for the MCP server's bundled access).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-servarr
  namespace: homepage
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: homepage-servarr
    creationPolicy: Owner
  data:
    - secretKey: HOMEPAGE_VAR_SONARR_API_KEY
      remoteRef:
        key: sonarr.lab.mtgibbs.dev/api-key
    - secretKey: HOMEPAGE_VAR_RADARR_API_KEY
      remoteRef:
        key: radarr.lab.mtgibbs.dev/api-key
    - secretKey: HOMEPAGE_VAR_LIDARR_API_KEY
      remoteRef:
        key: lidarr.lab.mtgibbs.dev/api-key
    - secretKey: HOMEPAGE_VAR_PROWLARR_API_KEY
      remoteRef:
        key: prowlarr.lab.mtgibbs.dev/api-key
    - secretKey: HOMEPAGE_VAR_SABNZBD_API_KEY
      remoteRef:
        key: sabnzbd.lab.mtgibbs.dev/api-key
    - secretKey: HOMEPAGE_VAR_BAZARR_API_KEY
      remoteRef:
        key: mcp-homelab/bazarr-api-key
