apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: USCSS PI-K3S
    description: Raspberry Pi Kubernetes Cluster
    theme: dark
    color: teal
    headerStyle: clean
    statusStyle: dot
    iconStyle: theme
    hideVersion: true
    useEqualHeights: true
    fullWidth: true
    layout:
      COMMAND:
        style: row
        columns: 4
        icon: mdi-monitor-dashboard
      COMMS:
        style: row
        columns: 4
        icon: mdi-antenna
      AI CORE:
        style: row
        columns: 5
        icon: mdi-brain
      REC DECK:
        style: row
        columns: 3
        icon: mdi-popcorn
      ACQUISITION:
        style: row
        columns: 4
        icon: mdi-download-network
      CARGO BAY:
        style: row
        columns: 6
        icon: mdi-package-variant-closed

  services.yaml: |
    - COMMAND:
        - Grafana:
            icon: grafana.png
            href: https://grafana.lab.mtgibbs.dev
            description: Dashboards & Metrics
            siteMonitor: https://grafana.lab.mtgibbs.dev
        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://status.lab.mtgibbs.dev
            description: Status Page
            widget:
              type: uptimekuma
              url: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
              slug: home
        - Prometheus:
            icon: prometheus.png
            description: Metrics Collection
            widget:
              type: prometheus
              url: http://kube-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local:9090
              fields: ["targets_up", "targets_down", "targets_total"]
        - Loki:
            icon: mdi-database-search
            href: https://grafana.lab.mtgibbs.dev/explore?orgId=1&left=%7B%22datasource%22:%22Loki%22%7D
            description: Log Storage
            widget:
              type: customapi
              url: http://loki.log-aggregation.svc.cluster.local:3100/loki/api/v1/index/stats
              refreshInterval: 60000
              mappings:
                - field: streams
                  label: Streams
                  format: number
                - field: chunks
                  label: Chunks
                  format: number

    - COMMS:
        - Pi-hole (pi-k3s):
            icon: pi-hole.png
            href: https://pihole.lab.mtgibbs.dev
            description: Ad Blocking & DNS
            widget:
              type: pihole
              url: http://pihole-web.pihole.svc.cluster.local
              version: 6
              key: "{{HOMEPAGE_VAR_PIHOLE_API_KEY}}"
              fields: ["queries", "blocked", "gravity"]
        - Pi-hole (pi5-worker-1):
            icon: pi-hole.png
            href: http://192.168.1.56/admin
            description: Ad Blocking & DNS
            widget:
              type: pihole
              url: http://192.168.1.56
              version: 6
              key: "{{HOMEPAGE_VAR_PIHOLE_SECONDARY_API_KEY}}"
              fields: ["queries", "blocked", "gravity"]
        - Unifi Controller:
            icon: unifi.png
            href: https://unifi.lab.mtgibbs.dev
            description: Network Management
            widget:
              type: unifi
              url: https://192.168.1.1
              key: "{{HOMEPAGE_VAR_UNIFI_KEY}}"
              fields: ["wlan_users", "lan_devices", "wan"]
        - Tailscale:
            icon: tailscale.png
            href: https://login.tailscale.com/admin/machines
            description: VPN & Remote Access
            widget:
              type: tailscale
              deviceid: "{{HOMEPAGE_VAR_TAILSCALE_DEVICE_ID}}"
              key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"

    - AI CORE:
        - Beelink GTR9 Pro:
            icon: mdi-chip
            href: https://grafana.lab.mtgibbs.dev/d/beelink-ai-load
            description: AI inference box — Strix Halo iGPU
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 10000
              metrics:
                - label: VRAM
                  query: round(100 * beelink_gpu_vram_used_bytes / beelink_gpu_vram_total_bytes)
                  format:
                    type: number
                    suffix: "%"
                - label: GPU
                  query: round(beelink_gpu_busy_percent)
                  format:
                    type: number
                    suffix: "%"
                - label: Temp
                  query: round(beelink_gpu_temp_celsius)
                  format:
                    type: number
                    suffix: "°C"
                - label: RAM
                  query: round(100 * (1 - node_memory_MemAvailable_bytes{instance="beelink"} / node_memory_MemTotal_bytes{instance="beelink"}))
                  format:
                    type: number
                    suffix: "%"
        - AI Mode:
            icon: mdi-swap-horizontal
            href: https://controlpanel.lab.mtgibbs.dev/?token={{HOMEPAGE_VAR_AI_CONTROLPANEL_TOKEN}}
            description: Family / Work mode (Beelink AI stack)
            widget:
              type: customapi
              url: https://controlpanel.lab.mtgibbs.dev/aimode
              refreshInterval: 10000
              mappings:
                - field: mode
                  label: Mode
                  format: text
        - Dewey (kids):
            icon: mdi-account-child
            href: https://dewey.lab.mtgibbs.dev
            description: Kid-safe chat (qwen3 + kiwix)
            siteMonitor: https://dewey.lab.mtgibbs.dev/health
        - Adults Chat:
            icon: mdi-robot-happy
            href: https://chat.lab.mtgibbs.dev
            description: Open WebUI (adults)
            siteMonitor: https://chat.lab.mtgibbs.dev/health
        - LiteLLM API:
            icon: mdi-api
            href: https://ai.lab.mtgibbs.dev
            description: OpenAI-compatible inference API
            siteMonitor: https://ai.lab.mtgibbs.dev/health/liveliness

    - REC DECK:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.lab.mtgibbs.dev
            description: Movies & TV
            widget:
              type: jellyfin
              url: http://jellyfin.jellyfin.svc.cluster.local:8096
              key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
              enableBlocks: true
              enableNowPlaying: true
              showEpisodeNumber: true
        - Immich:
            icon: immich.png
            href: https://immich.lab.mtgibbs.dev
            description: Photos & Videos
            widget:
              type: immich
              url: http://immich-server.immich.svc.cluster.local:2283
              key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
              version: 2
              fields: ["photos", "videos", "storage"]
        - Jellyseerr:
            icon: jellyseerr.png
            href: https://requests.lab.mtgibbs.dev
            description: Media Requests
            siteMonitor: https://requests.lab.mtgibbs.dev

    - ACQUISITION:
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.lab.mtgibbs.dev
            description: TV Shows
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local:8989
              key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
        - Radarr:
            icon: radarr.png
            href: https://radarr.lab.mtgibbs.dev
            description: Movies
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local:7878
              key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
        - Bazarr:
            icon: bazarr.png
            href: https://bazarr.lab.mtgibbs.dev
            description: Subtitles
            widget:
              type: bazarr
              url: http://bazarr.media.svc.cluster.local:6767
              key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
        - SABnzbd:
            icon: sabnzbd.png
            href: https://sabnzbd.lab.mtgibbs.dev
            description: Usenet Client
            widget:
              type: sabnzbd
              url: http://sabnzbd.media.svc.cluster.local:8080
              key: "{{HOMEPAGE_VAR_SABNZBD_API_KEY}}"

    - CARGO BAY:
        - Calibre-Web:
            icon: calibre-web.png
            href: https://calibre.lab.mtgibbs.dev
            description: eBook Library
            siteMonitor: https://calibre.lab.mtgibbs.dev
        - LazyLibrarian:
            icon: lazylibrarian.png
            href: https://lazylibrarian.lab.mtgibbs.dev
            description: eBook Search & Management
            siteMonitor: https://lazylibrarian.lab.mtgibbs.dev
        - Kiwix:
            icon: mdi-bookshelf
            href: https://kiwix.lab.mtgibbs.dev
            description: Offline Wikipedia & Reference
            siteMonitor: https://kiwix.lab.mtgibbs.dev
        - QNAP NAS:
            icon: qnap.png
            href: https://qnap.lab.mtgibbs.dev
            description: Storage
            siteMonitor: https://qnap.lab.mtgibbs.dev
        - Lidarr:
            icon: lidarr.png
            href: https://lidarr.lab.mtgibbs.dev
            description: Music
            siteMonitor: https://lidarr.lab.mtgibbs.dev
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qbit.lab.mtgibbs.dev
            description: Torrent Client
            siteMonitor: https://qbit.lab.mtgibbs.dev
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.lab.mtgibbs.dev
            description: Indexer Manager
            siteMonitor: https://prowlarr.lab.mtgibbs.dev
        - n8n:
            icon: n8n.png
            href: https://n8n.lab.mtgibbs.dev
            description: Workflow Automation
            siteMonitor: https://n8n.lab.mtgibbs.dev
        - Log Drain:
            icon: mdi-cloud-download
            href: https://logs.mtgibbs.dev
            description: Heroku Logs
            siteMonitor: https://logs.mtgibbs.dev
        - Personal Site (Cluster):
            icon: mdi-web
            href: https://site.lab.mtgibbs.dev
            description: Next.js on K3s
            siteMonitor: https://site.lab.mtgibbs.dev
        - Personal Site (Heroku):
            icon: mdi-cloud
            href: https://mtgibbs.xyz
            description: Production
            siteMonitor: https://mtgibbs.xyz
        - Cloudflare:
            icon: cloudflare.png
            href: https://dash.cloudflare.com
            description: DNS & CDN

  widgets.yaml: |
    - search:
        provider: google
        target: _blank

    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Pi Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - openmeteo:
        label: Johns Creek
        latitude: 34.0289
        longitude: -84.1986
        timezone: America/New_York
        units: imperial
        cache: 5

    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.png
              href: https://github.com/mtgibbs/pi-cluster
        - Flux CD:
            - icon: flux-cd.png
              href: https://fluxcd.io/docs/
    - AI:
        - AI Controls:
            - icon: mdi-tune-vertical
              href: https://controlpanel.lab.mtgibbs.dev/?token={{HOMEPAGE_VAR_AI_CONTROLPANEL_TOKEN}}
    - Network:
        - Tailscale Admin:
            - icon: tailscale.png
              href: https://login.tailscale.com/admin
        - Tailscale ACLs:
            - icon: tailscale.png
              href: https://login.tailscale.com/admin/acls

  docker.yaml: |
    # Docker integration disabled - using Kubernetes

  kubernetes.yaml: |
    mode: cluster

  # NOSTROMO terminal theme — specs/homepage-retro-theme/spec.md §7
  # Muted teal phosphor · darkened-orange errors · icons behind the terminal pane.
  # Structure: tokens → fonts → base → texture → header → cards → icons → status → bookmarks
  custom.css: |
    @import url('https://fonts.googleapis.com/css2?family=Michroma&family=Share+Tech+Mono&display=swap');

    :root {
      --crt-bg: #04100f;            /* near-black, teal-tinted */
      --crt-surface: rgba(8, 26, 24, 0.82);    /* card / icon-badge surface */
      --crt-border: #18403a;        /* card/section/badge borders */
      --phosphor: #54bcab;          /* muted teal — headings, values, status-up */
      --phosphor-body: #93cabf;     /* body text */
      --phosphor-dim: #4a8278;      /* descriptions, secondary */
      --amber: #d9a020;             /* warnings/degraded ONLY (muted gold) */
      --error-orange: #c2521e;      /* down/error ONLY — darkened orange (teal's complement) */
      --accent: #6fe7d3;            /* Blade Runner accent — hover states ONLY (bright teal) */
      --glow-teal: 0 0 8px rgba(84, 188, 171, 0.40);
      --glow-error: 0 0 10px rgba(194, 82, 30, 0.50);
      --pane-glow: inset 0 0 10px rgba(84, 188, 171, 0.12);  /* icon-badge inner glass */
      --scanline: rgba(0, 0, 0, 0.14);
      --vignette: rgba(0, 0, 0, 0.5);
    }

    /* ── fonts + base ─────────────────────────────────────────────── */
    html, body, #page_container {
      background: var(--crt-bg) !important;
    }
    body {
      font-family: "Share Tech Mono", ui-monospace, monospace !important;
      color: var(--phosphor-body);
    }
    ::selection {
      background: var(--phosphor);
      color: var(--crt-bg);
    }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--crt-bg); }
    ::-webkit-scrollbar-thumb {
      background: var(--crt-border);
      border: 1px solid var(--phosphor-dim);
    }

    /* ── CRT texture: scanlines + vignette (no motion) ────────────── */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background:
        repeating-linear-gradient(
          0deg,
          var(--scanline) 0px,
          var(--scanline) 1px,
          transparent 1px,
          transparent 3px
        ),
        radial-gradient(
          ellipse at center,
          transparent 60%,
          var(--vignette) 100%
        );
    }

    /* ── header / info widgets ────────────────────────────────────── */
    #information-widgets {
      border-bottom: 1px solid var(--crt-border);
      color: var(--phosphor-body);
    }
    #information-widgets .widget-container,
    #information-widgets .widget-inner-text {
      font-family: "Share Tech Mono", ui-monospace, monospace !important;
    }
    .information-widget-label { color: var(--phosphor-dim) !important; }
    #information-widgets input {
      background: var(--crt-surface) !important;
      border: 1px solid var(--crt-border) !important;
      border-radius: 2px !important;
      color: var(--phosphor-body) !important;
      font-family: "Share Tech Mono", ui-monospace, monospace !important;
    }
    #information-widgets input:focus {
      border-color: var(--phosphor) !important;
      outline: none;
    }

    /* ── deck (group) headers — MU-TH-UR section dividers ─────────── */
    .service-group-name {
      font-family: "Michroma", "Eurostile", sans-serif !important;
      color: var(--phosphor) !important;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.9rem !important;
      text-shadow: var(--glow-teal);
      border-bottom: 1px solid var(--crt-border);
      padding-bottom: 0.35rem;
      width: 100%;
    }
    .service-group-name::before {
      content: "// ";
      color: var(--phosphor-dim);
      text-shadow: none;
    }
    .service-group-icon { color: var(--phosphor) !important; }

    /* ── service cards — sharp-cornered terminal panels ───────────── */
    .service-card {
      background: var(--crt-surface) !important;
      border: 1px solid var(--crt-border) !important;
      border-radius: 2px !important;
      box-shadow: none !important;
      transition: border-color 120ms ease;
    }
    .service-card:hover {
      border-color: var(--accent) !important;
    }
    .service-name {
      color: var(--phosphor) !important;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-family: "Share Tech Mono", ui-monospace, monospace !important;
    }
    .service-description { color: var(--phosphor-dim) !important; }
    .service-block {
      font-family: "Share Tech Mono", ui-monospace, monospace !important;
      color: var(--phosphor-body) !important;
    }

    /* ── icons: snapped into a badge, viewed "through the terminal pane" ─ */
    /* ICON:PANE */
    .service-icon {
      box-sizing: border-box !important;
      background: var(--crt-surface) !important;
      border: 1px solid var(--crt-border) !important;
      border-radius: 4px !important;
      padding: 5px !important;
      box-shadow: var(--pane-glow) !important;
      transition: border-color 140ms ease;
    }
    /* monochrome any raster (.png) logo toward teal — nothing renders brand-color.
       grayscale → sepia(warm base) → hue-rotate(spin to teal) → saturate/dim. */
    .service-icon img,
    .service-icon svg {
      filter: grayscale(1) sepia(1) hue-rotate(120deg) saturate(1.5)
              brightness(0.92) opacity(0.9) !important;
      transition: filter 140ms ease;
    }
    /* hover: the pane lights up */
    .service-card:hover .service-icon {
      border-color: var(--accent) !important;
    }
    .service-card:hover .service-icon img,
    .service-card:hover .service-icon svg {
      filter: grayscale(1) sepia(1) hue-rotate(120deg) saturate(2.2)
              brightness(1.08) opacity(1) !important;
    }

    /* ── status indicators — teal/amber/orange semantics ──────────── */
    /* Sanctioned exception (spec §7): state-bearing color utilities,
       scoped inside stable status wrappers only. */
    /* STATUS:DOWN */
    .site-monitor-status [class*="bg-rose"],
    .ping-status [class*="bg-rose"],
    .k8s-status [class*="bg-rose"],
    .site-monitor-status [class*="bg-red"],
    .ping-status [class*="bg-red"],
    .k8s-status [class*="bg-red"] {
      background-color: var(--error-orange) !important;
      box-shadow: var(--glow-error);
    }
    /* STATUS:WARN */
    .site-monitor-status [class*="bg-yellow"],
    .ping-status [class*="bg-yellow"],
    .k8s-status [class*="bg-yellow"],
    .site-monitor-status [class*="bg-orange"],
    .ping-status [class*="bg-orange"],
    .k8s-status [class*="bg-orange"] {
      background-color: var(--amber) !important;
    }
    /* STATUS:UP */
    .site-monitor-status [class*="bg-emerald"],
    .ping-status [class*="bg-emerald"],
    .k8s-status [class*="bg-emerald"],
    .site-monitor-status [class*="bg-green"],
    .ping-status [class*="bg-green"],
    .k8s-status [class*="bg-green"] {
      background-color: var(--phosphor) !important;
      box-shadow: var(--glow-teal);
    }

    /* ── bookmarks ────────────────────────────────────────────────── */
    .bookmark-group .bookmark-text,
    .bookmark-name { color: var(--phosphor-body) !important; }
    .bookmark-description { color: var(--phosphor-dim) !important; }
    .bookmark:hover .bookmark-name { color: var(--accent) !important; }
