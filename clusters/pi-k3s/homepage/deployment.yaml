apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      # NOTE: previously had nodeAffinity preferring pi3-worker-2 (1GB Pi 3) as a
      # "lightweight" service — removed 2026-05-24. The Pi 3 is a batch-only runner
      # (tainted role=batch:NoSchedule); serving apps belong on the 8GB Pi 5s.
      # See docs/incidents/2026-05-24-pi3-worker-2-overload.md.
      initContainers:
        - name: copy-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              cp /configmap/* /config/
              mkdir -p /config/logs
          volumeMounts:
            - name: configmap
              mountPath: /configmap
            - name: config
              mountPath: /config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "home.lab.mtgibbs.dev"
          envFrom:
            - secretRef:
                name: homepage-pihole
                optional: true
            - secretRef:
                name: homepage-pihole-secondary
                optional: true
            - secretRef:
                name: homepage-jellyfin
                optional: true
            - secretRef:
                name: homepage-immich
                optional: true
            - secretRef:
                name: homepage-unifi
                optional: true
            - secretRef:
                name: homepage-tailscale
                optional: true
            - secretRef:
                name: homepage-servarr
                optional: true
            - secretRef:
                name: homepage-ai-controlpanel
                optional: true
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: configmap
          configMap:
            name: homepage-config
        - name: config
          emptyDir: {}
