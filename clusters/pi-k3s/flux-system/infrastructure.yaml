# 27. Family Board - smart-board PWA rendering the n8n intake feed (board.lab.mtgibbs.dev)
# NOTE: deliberately NO postBuild.substituteFrom — the dashboard JS uses ${...}
# template literals that envsubst would clobber. Static files ship as hashed
# ConfigMaps (configMapGenerator), so edits auto-roll the pod.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: family-board
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-config
    - name: ingress
    - name: cert-manager-config
  interval: 10m
  path: ./clusters/pi-k3s/family-board
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
---
# 28. Renovate - self-hosted dependency-update PRs (weekly CronJob).
# PRs are gated: zero automerge, the human/local-agent decides. Renovate reads
# the policy from /renovate.json at the repo root when it scans mtgibbs/pi-cluster.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-config
  interval: 10m
  path: ./clusters/pi-k3s/renovate
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
---
# 29. review-hub - reactive PR-evaluator webhook receiver. A GitHub App POSTs
# pull_request webhooks (via the Cloudflare Tunnel) -> this service judges changed
# triggerable CronJobs against the Beelink LiteLLM and posts a Check Run. One App,
# all repos, per-repo tokens. Needs the review-hub 1Password item + the GHCR image
# (see specs/review-hub/RECEIVER.md) before it goes green.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: review-hub
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-config
  interval: 10m
  path: ./clusters/pi-k3s/review-hub
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
---
