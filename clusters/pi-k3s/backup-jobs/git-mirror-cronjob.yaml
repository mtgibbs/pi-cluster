apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-mirror-backup
  namespace: backup-jobs
spec:
  schedule: "30 3 * * 0"  # Every Sunday at 3:30 AM (after PVC backup at 2:00 AM)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            kubernetes.io/hostname: pi-k3s
          containers:
            - name: git-mirror
              image: instrumentisto/rsync-ssh:alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  apk add --no-cache git curl jq

                  GITHUB_USER="mtgibbs"
                  GITHUB_TOKEN=$(cat /github/token)
                  export GITHUB_TOKEN
                  export GIT_TERMINAL_PROMPT=0
                  # Auth via a credential helper so the token is NEVER written into
                  # any repo's config (and therefore never rsynced to the NAS).
                  # Single quotes keep the LITERAL $GITHUB_TOKEN in ~/.gitconfig
                  # (pod-local emptyDir, not synced); git expands it only at runtime.
                  git config --global credential.helper \
                    '!f() { echo username=x-access-token; echo "password=$GITHUB_TOKEN"; }; f'
                  NAS_USER="cluster-backup"
                  NAS_HOST="storage.lab.mtgibbs.dev"
                  NAS_PATH="/share/cluster/backups/git-mirrors"
                  WORK_DIR="/tmp/mirrors"
                  SSH_KEY="/ssh/id_ed25519"

                  echo "=== GitHub Repository Mirror Backup ==="
                  echo "Date: $(date +%Y-%m-%d)"
                  echo "Destination: ${NAS_USER}@${NAS_HOST}:${NAS_PATH}"
                  echo ""

                  # Fix SSH key permissions
                  cp ${SSH_KEY} /tmp/id_ed25519
                  chmod 600 /tmp/id_ed25519

                  # Create workspace and NAS target dir
                  mkdir -p ${WORK_DIR}
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} "mkdir -p ${NAS_PATH}"

                  # Pull existing mirrors from NAS (incremental - avoids full re-clone)
                  echo "--- Syncing existing mirrors from NAS ---"
                  rsync -az -e "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no" \
                    ${NAS_USER}@${NAS_HOST}:${NAS_PATH}/ ${WORK_DIR}/ 2>/dev/null || true

                  # Fetch all repos from GitHub API. FAIL LOUDLY on auth errors —
                  # a silently-swallowed 401 previously made this a no-op that
                  # reported success while mirroring nothing.
                  echo "--- Fetching repository list from GitHub ---"
                  HTTP_CODE=$(curl -s -o /tmp/repos.json -w "%{http_code}" \
                    -H "Authorization: token ${GITHUB_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/user/repos?per_page=100&affiliation=owner")
                  if [ "${HTTP_CODE}" != "200" ]; then
                    echo "ERROR: GitHub API returned HTTP ${HTTP_CODE} — token invalid/expired?" >&2
                    head -c 300 /tmp/repos.json >&2; echo >&2
                    exit 1
                  fi
                  REPO_COUNT=$(jq 'length' /tmp/repos.json)
                  echo "Found ${REPO_COUNT} repositories"
                  if [ "${REPO_COUNT}" -eq 0 ]; then
                    echo "ERROR: 0 repositories returned — refusing to sync an empty mirror set" >&2
                    exit 1
                  fi
                  REPOS=$(jq -r '.[].clone_url' /tmp/repos.json)
                  echo ""

                  # Mirror each repo using CLEAN URLs only — auth comes from the
                  # credential helper, so no token lands in any repo config.
                  # The set-url on existing mirrors also SCRUBS any token baked in
                  # by the previous version of this job (rewrites it token-less,
                  # then the rsync below overwrites the NAS copy).
                  for REPO_URL in ${REPOS}; do
                    REPO_NAME=$(basename "${REPO_URL}" .git)
                    MIRROR_DIR="${WORK_DIR}/${REPO_NAME}.git"

                    if [ -d "${MIRROR_DIR}" ]; then
                      echo "--- Updating mirror: ${REPO_NAME} ---"
                      cd "${MIRROR_DIR}"
                      git remote set-url origin "${REPO_URL}"
                      git remote update --prune
                      cd /
                    else
                      echo "--- Cloning new mirror: ${REPO_NAME} ---"
                      git clone --mirror "${REPO_URL}" "${MIRROR_DIR}"
                    fi
                  done

                  echo ""
                  echo "--- Syncing mirrors to NAS ---"
                  rsync -az --delete \
                    -e "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no" \
                    ${WORK_DIR}/ ${NAS_USER}@${NAS_HOST}:${NAS_PATH}/

                  echo ""
                  echo "=== Mirror Backup Summary ==="
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} "ls -la ${NAS_PATH}/"

                  echo ""
                  echo "Git mirror backup completed successfully!"

                  # Cleanup
                  rm -f /tmp/id_ed25519
              volumeMounts:
                - name: ssh-key
                  mountPath: /ssh
                  readOnly: true
                - name: github-token
                  mountPath: /github
                  readOnly: true
                - name: workspace
                  mountPath: /tmp/mirrors
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: ssh-key
              secret:
                secretName: backup-ssh-key
                defaultMode: 0400
            - name: github-token
              secret:
                secretName: github-mirror-token
                defaultMode: 0400
            - name: workspace
              emptyDir: {}
