apiVersion: batch/v1
kind: CronJob
metadata:
  name: pvc-backup
  namespace: backup-jobs
spec:
  schedule: "0 2 * * 0"  # Every Sunday at 2:00 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          # Must run on pi-k3s where local-path PVCs are stored
          nodeSelector:
            kubernetes.io/hostname: pi-k3s
          containers:
            - name: backup
              image: instrumentisto/rsync-ssh:alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  BACKUP_DATE=$(date +%Y-%m-%d)
                  STORAGE_DIR="/storage"
                  NAS_USER="cluster-backup"
                  NAS_HOST="storage.lab.mtgibbs.dev"
                  NAS_PATH="/share/cluster/backups"
                  SSH_KEY="/ssh/id_ed25519"

                  echo "=== K3s PVC Backup (rsync over SSH) ==="
                  echo "Date: ${BACKUP_DATE}"
                  echo "Destination: ${NAS_USER}@${NAS_HOST}:${NAS_PATH}/${BACKUP_DATE}"
                  echo ""

                  # Fix SSH key permissions
                  cp ${SSH_KEY} /tmp/id_ed25519
                  chmod 600 /tmp/id_ed25519

                  # Create backup directory on NAS
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} "mkdir -p ${NAS_PATH}/${BACKUP_DATE}"

                  # PVCs to backup (namespace_pvcname patterns)
                  PVCS="uptime-kuma_uptime-kuma-data uptime-kuma_autokuma-data pihole_pihole-etc pihole_pihole-dnsmasq monitoring_kube-prometheus-grafana jellyfin_jellyfin-config"

                  for PVC in ${PVCS}; do
                    echo "--- Backing up: ${PVC} ---"

                    # Find the PVC directory (pattern: pvc-*_namespace_pvcname)
                    PVC_PATH=$(find ${STORAGE_DIR} -maxdepth 1 -type d -name "*_${PVC}" 2>/dev/null | head -1)

                    if [ -z "${PVC_PATH}" ]; then
                      echo "WARNING: PVC directory not found for ${PVC}, skipping"
                      continue
                    fi

                    echo "Source: ${PVC_PATH}"

                    # Rsync to NAS over SSH
                    rsync -avz --delete \
                      -e "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no" \
                      "${PVC_PATH}/" \
                      "${NAS_USER}@${NAS_HOST}:${NAS_PATH}/${BACKUP_DATE}/${PVC}/"

                    echo "Completed: ${PVC}"
                    echo ""
                  done

                  # Cleanup old backups — TWO bugs fixed here, both live.
                  #
                  # BUG 2: the retention window counted NIGHTS, not WEEKS.
                  # Directories in this parent accrue nightly — the Beelink's
                  # off-cluster backup writes {date}/beelink/ every night at 03:30
                  # (see .claude/skills/backup-ops/SKILL.md) — while cluster backup
                  # sets are written WEEKLY, on Sunday. "Keep 4" therefore meant
                  # four NIGHTS. The previous Sunday's complete cluster backup was
                  # evicted every Wednesday, so the cluster had exactly ONE restore
                  # point at any moment, destroyed at the same instant its
                  # replacement was being written. A corrupt or partial Sunday run
                  # left nothing to fall back to.
                  #
                  # Confirmed from pvc-backup's own 2026-07-19 summary listing: the
                  # link counts give it away — 2026-07-16/17/18 each had 1 subdir
                  # (beelink only), 2026-07-19 had 6 (full cluster set), and
                  # 2026-07-12, the prior Sunday, was already gone.
                  #
                  # KEEP_DIRS is now measured against the nightly cadence: 30 dirs
                  # ~= 30 nights ~= 4 Sunday cluster sets plus the nightlies in
                  # between. This is the knob to turn to trade disk for restore
                  # points. It is NOT four of anything anymore — read it as days.
                  KEEP_DIRS=30
                  #
                  # BUG 1: the grep is load-bearing, not cosmetic. ${NAS_PATH} is a shared
                  # parent: git-mirror-cronjob.yaml writes git-mirrors/ as a SIBLING
                  # of the dated dirs. The original command was an unfiltered
                  # `ls -dt */ | tail -n +5`, which ranked git-mirrors/ by mtime
                  # alongside the backup sets — it landed at position 5 and was
                  # deleted every single Sunday. It went unnoticed because
                  # git-mirror-backup runs 90 min later, recreates the directory,
                  # and re-clones all 48 repos, so both jobs stayed green and the
                  # tree always looked present by morning.
                  #
                  # The legacy April dirs survived only because they're
                  # foreign-owned (rm fails with EPERM). git-mirrors/ is owned by
                  # cluster-backup — the same user this job runs as — so its
                  # deletion succeeded silently, with no error line to notice.
                  #
                  # Only YYYY-MM-DD directories are deletion candidates. Anything
                  # else is reported and left alone: an unrecognized name means
                  # someone put data here that this job doesn't understand, which
                  # is a reason to stop, not a reason to delete.
                  echo "--- Cleaning up old backups ---"
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} \
                    "cd ${NAS_PATH} && ls -d */ 2>/dev/null | grep -Ev '^[0-9]{4}-[0-9]{2}-[0-9]{2}/\$' | sed 's/^/RETENTION: not a dated backup set, leaving untouched: /'" || true
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} \
                    "cd ${NAS_PATH} && ls -dt */ 2>/dev/null | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}/\$' | tail -n +$((KEEP_DIRS + 1)) | xargs -r rm -rf" || true
                  # ^ best-effort: legacy pre-QNAP-cutover dirs are foreign-owned
                  #   and may resist deletion; never fail a good backup on cleanup.

                  echo ""
                  echo "=== Backup Summary ==="
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} "ls -la ${NAS_PATH}/"

                  echo ""
                  echo "Backup completed successfully!"

                  # Cleanup temp key
                  rm -f /tmp/id_ed25519
              volumeMounts:
                - name: k3s-storage
                  mountPath: /storage
                  readOnly: true
                - name: ssh-key
                  mountPath: /ssh
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: k3s-storage
              hostPath:
                path: /var/lib/rancher/k3s/storage
                type: Directory
            - name: ssh-key
              secret:
                secretName: backup-ssh-key
                defaultMode: 0400
