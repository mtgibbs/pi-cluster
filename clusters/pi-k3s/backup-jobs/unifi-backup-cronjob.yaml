apiVersion: batch/v1
kind: CronJob
metadata:
  name: unifi-backup
  namespace: backup-jobs
spec:
  schedule: "30 3 * * 0"  # Every Sunday at 3:30 AM (after PVC backup at 2:00 AM)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: unifi-backup
              image: alpine:3.24
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  apk add --no-cache curl jq openssh-client

                  BACKUP_DATE=$(date +%Y-%m-%d)
                  # UDM Pro Max (built-in controller) — cutover 2026-04-19, CK Gen1 retired.
                  # UniFi OS: auth at /api/auth/login, Network app proxied under /proxy/network/.
                  CONTROLLER="https://192.168.1.1"
                  SITE="default"
                  NAS_USER="cluster-backup"
                  NAS_HOST="storage.lab.mtgibbs.dev"
                  NAS_PATH="/share/cluster/backups/${BACKUP_DATE}/unifi"
                  SSH_KEY="/ssh/id_ed25519"
                  HDR="/tmp/unifi_hdr"

                  echo "=== UniFi Config Backup (UDM Pro Max) ==="
                  echo "Date: ${BACKUP_DATE}"
                  echo "Controller: ${CONTROLLER}"
                  echo "Destination: ${NAS_USER}@${NAS_HOST}:${NAS_PATH}"
                  echo ""

                  # Fix SSH key permissions
                  cp ${SSH_KEY} /tmp/id_ed25519
                  chmod 600 /tmp/id_ed25519

                  # --- 1. Authenticate (UniFi OS /api/auth/login) ---
                  # Capture the TOKEN session cookie + CSRF token from response headers.
                  # NOTE: the TOKEN cookie carries the CHIPS "partitioned" attribute, which
                  # some curl builds will not replay from a cookie jar — so we extract it and
                  # send it back explicitly via the Cookie header (robust across curl versions).
                  # Requires a UniFi *Network admin* account; a login-only account 403s here.
                  echo "--- Authenticating with UDM controller ---"
                  HTTP_CODE=$(curl -sk -o /tmp/login_resp -D "${HDR}" -w "%{http_code}" \
                    -X POST "${CONTROLLER}/api/auth/login" \
                    -H "Content-Type: application/json" \
                    -H "Origin: ${CONTROLLER}" -H "Referer: ${CONTROLLER}/" \
                    -d "{\"username\":\"${UNIFI_USERNAME}\",\"password\":\"${UNIFI_PASSWORD}\"}")

                  if [ "${HTTP_CODE}" != "200" ]; then
                    echo "ERROR: Authentication failed (HTTP ${HTTP_CODE})"
                    cat /tmp/login_resp
                    exit 1
                  fi

                  TOKEN=$(grep -i '^set-cookie: *TOKEN=' "${HDR}" | sed -E 's/^[Ss]et-[Cc]ookie: *TOKEN=([^;]+).*/\1/' | head -1)
                  CSRF=$(grep -i '^x-csrf-token:' "${HDR}" | awk '{print $2}' | tr -d '\r')
                  if [ -z "${TOKEN}" ]; then
                    echo "ERROR: no TOKEN cookie returned from login"
                    exit 1
                  fi
                  echo "Authentication successful"

                  # --- 2. Generate on-demand backup ---
                  # The UDM (unlike CK Gen1 on 6.1.71) generates on-demand backups fine.
                  echo "--- Generating backup ---"
                  RESP=$(curl -sk --max-time 90 \
                    -H "Cookie: TOKEN=${TOKEN}" \
                    -H "X-CSRF-Token: ${CSRF}" \
                    -H "Origin: ${CONTROLLER}" -H "Referer: ${CONTROLLER}/" \
                    -X POST "${CONTROLLER}/proxy/network/api/s/${SITE}/cmd/backup" \
                    -H "Content-Type: application/json" \
                    -d '{"cmd":"backup","days":-1}')

                  DL_URL=$(echo "${RESP}" | jq -r '.data[0].url // empty')
                  if [ -z "${DL_URL}" ]; then
                    echo "ERROR: backup command returned no download URL"
                    echo "${RESP}"
                    exit 1
                  fi
                  echo "Backup generated: ${DL_URL}"

                  # --- 3. Download the .unf ---
                  echo "--- Downloading backup ---"
                  curl -sk --max-time 120 -o /tmp/unifi-backup.unf \
                    -H "Cookie: TOKEN=${TOKEN}" \
                    -H "Origin: ${CONTROLLER}" -H "Referer: ${CONTROLLER}/" \
                    "${CONTROLLER}/proxy/network/${DL_URL#/}"

                  BACKUP_SIZE=$(wc -c < /tmp/unifi-backup.unf)
                  echo "Downloaded backup: ${BACKUP_SIZE} bytes"

                  if [ "${BACKUP_SIZE}" -lt 1000 ]; then
                    echo "ERROR: Backup file too small, likely failed"
                    exit 1
                  fi

                  # --- 4. Copy to NAS via SSH ---
                  echo "--- Copying to NAS ---"
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} "mkdir -p ${NAS_PATH}"

                  scp -O -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    /tmp/unifi-backup.unf \
                    "${NAS_USER}@${NAS_HOST}:${NAS_PATH}/unifi-backup-${BACKUP_DATE}.unf"

                  echo "Backup copied to NAS"

                  # --- 5. Release the controller session ---
                  curl -sk -o /dev/null \
                    -H "Cookie: TOKEN=${TOKEN}" -H "X-CSRF-Token: ${CSRF}" \
                    -H "Origin: ${CONTROLLER}" -H "Referer: ${CONTROLLER}/" \
                    -X POST "${CONTROLLER}/api/auth/logout" || true

                  # --- 6. Cleanup old UniFi backups (keep last 4 weekly) ---
                  echo "--- Cleaning up old UniFi backups ---"
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} \
                    "find /share/cluster/backups/*/unifi -name '*.unf' -type f 2>/dev/null | sort -r | tail -n +5 | xargs -r rm -f" || true

                  echo ""
                  echo "=== UniFi Backup Complete ==="
                  echo "File: unifi-backup-${BACKUP_DATE}.unf (${BACKUP_SIZE} bytes)"

                  # Cleanup temp files
                  rm -f /tmp/id_ed25519 /tmp/unifi-backup.unf /tmp/login_resp "${HDR}"
              env:
                - name: UNIFI_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: unifi-credentials
                      key: username
                - name: UNIFI_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: unifi-credentials
                      key: password
              volumeMounts:
                - name: ssh-key
                  mountPath: /ssh
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: ssh-key
              secret:
                secretName: backup-ssh-key
                defaultMode: 0400
