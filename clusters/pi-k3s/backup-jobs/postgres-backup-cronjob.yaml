apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: backup-jobs
spec:
  schedule: "30 2 * * 0"  # Every Sunday at 2:30 AM (after PVC backup starts)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: postgres-backup
          containers:
            - name: backup
              image: instrumentisto/rsync-ssh:alpine
              command:
                - /bin/sh
                - -c
                - |
                  # Install PostgreSQL client
                  apk add --no-cache postgresql16-client

                  BACKUP_DATE=$(date +%Y-%m-%d)
                  NAS_USER="cluster-backup"
                  NAS_HOST="storage.lab.mtgibbs.dev"
                  NAS_PATH="/share/cluster/backups"
                  SSH_KEY="/ssh/id_ed25519"

                  echo "=== PostgreSQL Backup ==="
                  echo "Date: ${BACKUP_DATE}"
                  echo ""

                  # Fix SSH key permissions
                  cp ${SSH_KEY} /tmp/id_ed25519
                  chmod 600 /tmp/id_ed25519

                  # Create backup directory on NAS
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} "mkdir -p ${NAS_PATH}/${BACKUP_DATE}/postgres"

                  backed_up=0
                  skipped=0
                  failed=0

                  backup_target() {
                    local name="$1"
                    local host="$2"
                    local user="$3"
                    local db="$4"
                    local password="$5"

                    export PGPASSWORD="$password"

                    if ! pg_isready -h "$host" -U "$user" -t 5 >/dev/null 2>&1; then
                      echo "--- SKIPPED: ${name} (unreachable) ---"
                      skipped=$((skipped + 1))
                      return 0
                    fi

                    if ! pg_dump -h "$host" -U "$user" -d "dbname=${db} connect_timeout=10" --format=custom --compress=9 \
                      -f "/tmp/${name}-postgres.dump"; then
                      echo "FAILED: ${name} pg_dump failed"
                      failed=$((failed + 1))
                      return 1
                    fi

                    if ! rsync -avz -e "ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no" \
                      "/tmp/${name}-postgres.dump" \
                      "${NAS_USER}@${NAS_HOST}:${NAS_PATH}/${BACKUP_DATE}/postgres/"; then
                      echo "FAILED: ${name} rsync failed"
                      failed=$((failed + 1))
                      return 1
                    fi

                    echo "Transferred to NAS"
                    backed_up=$((backed_up + 1))
                    return 0
                  }

                  backup_target "immich" "immich-postgresql.immich.svc.cluster.local" "immich" "immich" "$DB_PASSWORD"
                  backup_target "n8n" "n8n-postgresql.n8n.svc.cluster.local" "n8n" "n8n" "$N8N_DB_PASSWORD"

                  echo "--- Backup Summary ---"
                  ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
                    ${NAS_USER}@${NAS_HOST} "ls -lh ${NAS_PATH}/${BACKUP_DATE}/postgres/"

                  echo "Backed up: ${backed_up}, Skipped: ${skipped}, Failed: ${failed}"

                  rm -f /tmp/id_ed25519 /tmp/immich-postgres.dump /tmp/n8n-postgres.dump

                  if [ "${failed}" -gt 0 ]; then exit 1; fi
                  exit 0
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-password
                      key: password
                - name: N8N_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: n8n-db-password
                      key: password
              volumeMounts:
                - name: ssh-key
                  mountPath: /ssh
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: ssh-key
              secret:
                secretName: backup-ssh-key
                defaultMode: 0400
