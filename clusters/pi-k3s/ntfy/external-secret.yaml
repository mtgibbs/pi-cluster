apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-secret
  namespace: ntfy
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: ntfy-secret
    creationPolicy: Owner
  data:
    # Shared family ntfy account password — used by the init container to seed the
    # user, and by n8n (basic auth) to publish reminders.
    - secretKey: FAMILY_PASSWORD
      remoteRef:
        key: ntfy/family-password
