apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi5-worker-1
                      - pi5-worker-2
      containers:
        - name: mealie
          image: ghcr.io/mealie-recipes/mealie:v3.20.1
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: BASE_URL
              value: https://recipes.lab.mtgibbs.dev
            - name: TZ
              value: America/New_York
            - name: ALLOW_SIGNUP
              value: "false"
            - name: DB_ENGINE
              value: postgres
            # Full DSN templated by the ExternalSecret; Mealie URL-encodes
            # the password portion itself (safe=''), unlike the discrete
            # POSTGRES_* path which chokes on '/' in passwords.
            - name: POSTGRES_URL_OVERRIDE
              valueFrom:
                secretKeyRef:
                  name: mealie-secret
                  key: POSTGRES_URL_OVERRIDE
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/app/about
              port: 9000
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/app/about
              port: 9000
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/app/about
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mealie-data
