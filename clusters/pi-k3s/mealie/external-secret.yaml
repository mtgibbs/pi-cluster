apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mealie-secret
  namespace: mealie
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: mealie-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        POSTGRES_PASSWORD: "{{ .password }}"
        # Mealie's DSN builder leaves '/' unescaped (urllib quote default),
        # so base64-ish passwords break URL parsing. The override path
        # re-quotes the password with safe='', which handles any password.
        POSTGRES_URL_OVERRIDE: "postgresql://mealie:{{ .password }}@mealie-postgresql:5432/mealie"
  data:
    - secretKey: password
      remoteRef:
        key: mealie/db-password
