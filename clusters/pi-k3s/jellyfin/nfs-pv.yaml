apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-video-nfs
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-video
  # NFSv3 (do NOT add nfsvers=4 — it breaks QNAP mounts; see media-services SKILL).
  # soft + timeo/retrans: a brief NAS read-stall ERRORS and recovers instead of a `hard`
  #   mount hanging "still trying" forever — that wedge froze Jellyfin 2026-06-15 and needed
  #   a manual force-unmount. (Read-only media, so `soft` is safe — no write-corruption risk.)
  # timeo=150 (15s; was 600/60s): a hung NFS read errors after ~15s per attempt instead of ~60s,
  #   so a QNAP read-stall becomes a short blip rather than a multi-minute freeze. The 2026-06-17
  #   "Bad Guys 2" freeze pinned pi-k3s iowait at 92% for 8 min on the old 60s timeout (a read
  #   that never returned). NOTE: retrans=2 still multiplies this (~15s × backoff, twice, before
  #   EIO) — drop retrans to 1 if an even harder ceiling is wanted.
  # nconnect=4: parallel TCP connections → more throughput headroom + resilience to a
  #   single-connection stall (the actual recurring failure mode).
  mountOptions:
    - nolock
    - soft
    - timeo=150
    - retrans=2
    - nconnect=4
  nfs:
    # Hardcoded IP (not storage.lab.mtgibbs.dev) ON PURPOSE: this PV mounts on pi-k3s, which
    # uses PUBLIC DNS (not Pi-hole) and only resolves the hostname via the /etc/hosts override
    # DaemonSet — a single point of failure. The QNAP IP is stable; hardcoding removes that hop.
    server: 192.168.1.61
    path: /cluster/media/video
    readOnly: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-video
  namespace: jellyfin
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: nfs-video
  resources:
    requests:
      storage: 1Ti
