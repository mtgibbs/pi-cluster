name: Tailscale ACL

# Validates policy on PRs, applies on push to main.
# Uses OAuth client with policy_file scope (separate from device-auth client).
# Source of truth: tailscale/policy.hujson

on:
  push:
    branches: [main]
    paths:
      - "tailscale/policy.hujson"
      - ".github/workflows/tailscale-acl.yml"
  pull_request:
    branches: [main]
    paths:
      - "tailscale/policy.hujson"
      - ".github/workflows/tailscale-acl.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  acl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test ACL (dry-run on PR)
        if: github.event_name == 'pull_request'
        uses: tailscale/gitops-acl-action@v1
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tailnet: ${{ secrets.TS_TAILNET }}
          action: test
          policy-file: tailscale/policy.hujson

      - name: Apply ACL (push to main)
        if: github.event_name == 'push'
        uses: tailscale/gitops-acl-action@v1
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tailnet: ${{ secrets.TS_TAILNET }}
          action: apply
          policy-file: tailscale/policy.hujson
