      +    const patch = { spec: { template: { metadata: { annotations: {
      +      'kubectl.kubernetes.io/restartedAt': new Date().toISOString(),
      +    } } } } };
      +    await patchDeployment(namespace, deployment, patch);
      +    return { success: true, message: `Triggered rolling restart of ${namespace}/${deployment}` };
      +  } catch (error) {
      +    return k8sError(error);
      +  }
      +}

