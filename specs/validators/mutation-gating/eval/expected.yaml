      -      return { success: true, message: `Triggered rolling restart of ${namespace}/${deployment}` };
      -    } catch (error) {
      -      return k8sError(error);
      -    }
      +    return doRestart(namespace, deployment);
      @@ -110,1 +98,14 @@
      +async function doRestart(namespace: string, deployment: string) {
