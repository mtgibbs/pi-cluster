  - id: validation-only-is-not-a-gate
    file: src/tools/cluster.ts
    verdict: fail
    why: >
      Precision trap — the new delete_deployment has a DNS-1123 regex check that LOOKS
      like a guard, but format validation only constrains the string shape, not WHICH
      resource. Any well-formed namespace/name is deleted. No allowlist/label/scope = ungated.
    diff: |
      @@ -109,1 +109,24 @@
      +const deleteDeployment: Tool = {
      +  name: 'delete_deployment',
      +  description: 'Delete a deployment.',
      +  inputSchema: {
      +    type: 'object',
      +    properties: {
      +      namespace: { type: 'string' },
      +      deployment: { type: 'string' },
      +    },
      +    required: ['namespace', 'deployment'],
      +  },
      +  handler: async (params) => {
      +    const namespace = params.namespace as string;
      +    const deployment = params.deployment as string;
      +    if (!DNS_1123_RE.test(namespace) || !DNS_1123_RE.test(deployment)) {
      +      return validationError('Invalid name. Must match DNS-1123 format.');
      +    }
      +    await getAppsApi().deleteNamespacedDeployment(deployment, namespace);
      +    return { success: true, message: `Deleted ${namespace}/${deployment}` };
      +  },
      +};

  - id: gate-helper-not-in-diff
    file: src/tools/cluster.ts
    verdict: pass
    why: >
      The new cordon_node DOES call a gate helper (isNodeAllowed) before mutating — the correct
      gated shape. Whether isNodeAllowed is actually defined is a compile/CI concern (a missing
      helper is a TypeScript error caught before merge), not a security-review one. A new mutating
      tool that calls an allowlist/gate helper is gated → pass.
    diff: |
      @@ -109,1 +109,18 @@
      +const cordonNode: Tool = {
      +  name: 'cordon_node',
      +  description: 'Cordon a node so no new pods schedule on it.',
      +  inputSchema: {
      +    type: 'object',
      +    properties: {
      +      node: { type: 'string' },
      +    },
      +    required: ['node'],
      +  },
      +  handler: async (params) => {
      +    const node = params.node as string;
      +    if (!isNodeAllowed(node)) {
      +      return notAllowedError(`Cordoning ${node}`);
      +    }
      +    await patchNode(node, { spec: { unschedulable: true } });
      +    return { success: true, message: `Cordoned ${node}` };
      +  },
      +};
