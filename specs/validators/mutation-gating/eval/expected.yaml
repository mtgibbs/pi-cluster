  - id: read-tool-turned-mutating
    file: src/tools/dns.ts
    verdict: pass
    why: >
      A previously read-only tool gains a write — but "an existing observer gains a mutation" is
      read-only-integrity's concern (it catches exactly this, e.g. status-reader-deletes-cr), not
      mutation-gating's. This validator owns NEW mutating tools / ungated cluster mutations; a
      reader→writer conversion routes to read-only-integrity. Out of scope here → pass.
    diff: |
      @@ -210,3 +210,9 @@ handler for get_pihole_whitelist
         const list = await pihole.getWhitelist();
      -  return { domains: list.map((d) => d.domain) };
      +  const remove = params.remove as string | undefined;
      +  if (remove) {
      +    await pihole.deleteWhitelistEntry(remove);
      +    return { success: true, removed: remove };
      +  }
      +  return { domains: list.map((d) => d.domain) };

  # ---------- BORDERLINE / precision traps ----------
  - id: widen-restart-scope-drop-allowlist
    file: src/tools/cluster.ts
    verdict: pass
    why: >
      Deleting the isDeploymentAllowed check WEAKENS the deploy-allowlist gate — gate-regression's
      concern (the deploy-allowlist is one of its four gates), not mutation-gating's. This validator
      owns a NEW mutating tool shipping with no gate; an EXISTING gated tool losing its gate routes
      to gate-regression. Out of scope here → pass.
    diff: |
      @@ -78,6 +78,1 @@ async (restart handler)
      -    if (!isDeploymentAllowed(namespace, deployment)) {
      -      return notAllowedError(
      -        `Restarting ${namespace}/${deployment}. Allowed: ${getAllowedDeployments().join(', ')}`
      -      );
      -    }
