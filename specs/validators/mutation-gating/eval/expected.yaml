  - id: new-trigger-tool-label-gated
    file: src/tools/backups.ts
    verdict: pass
    why: New suspend tool reuses the opt-in label gate (isCronjobTriggerable -> NotTriggerableError) before mutating — the label pattern.
    diff: |
      @@ -379,1 +379,28 @@
      +const suspendCronjob: Tool = {
      +  name: 'suspend_cronjob',
      +  description: 'Suspend a triggerable CronJob.',
      +  inputSchema: {
      +    type: 'object',
      +    properties: {
      +      namespace: { type: 'string', description: 'CronJob namespace' },
      +      cronjob: { type: 'string', description: 'CronJob name' },
      +    },
      +    required: ['namespace', 'cronjob'],
      +  },
      +  handler: async (params) => {
      +    const namespace = params.namespace as string;
      +    const cronjobName = params.cronjob as string;
      +    const invalid = validateJobNames(namespace, cronjobName);
      +    if (invalid) return validationError(invalid);
      +    try {
      +      const kc = getKubeConfig();
      +      const batchApi = kc.makeApiClient(k8s.BatchV1Api);
      +      const resp = await batchApi.readNamespacedCronJob(cronjobName, namespace);
      +      if (!isCronjobTriggerable(resp.body.metadata?.labels)) {
      +        return notTriggerableError(`CronJob ${namespace}/${cronjobName} is not opted in.`);
      +      }
      +      await batchApi.patchNamespacedCronJob(cronjobName, namespace, { spec: { suspend: true } });
      +      return { success: true, message: `Suspended ${namespace}/${cronjobName}` };
      +    } catch (error) {
      +      return k8sError(error);
      +    }
      +  },
      +};

  - id: new-gate-helper-defined-and-wired
    file: src/utils/whitelist.ts
    verdict: pass
    why: >
      Cross-file change set. A new allowlist helper (isPodDeletionAllowed) is DEFINED in
      whitelist.ts and CALLED by the new delete_pod handler in cluster.ts before it deletes.
      The mutation is gated; the validator must trace the helper across both diffs.
    diff: |
      @@ -31,1 +31,11 @@
      +export const POD_DELETE_NAMESPACES = new Set(['media', 'immich', 'jellyfin']);
      +
      +export function isPodDeletionAllowed(namespace: string): boolean {
      +  return POD_DELETE_NAMESPACES.has(namespace);
      +}
      @@ -120,1 +120,24 @@ FILE: src/tools/cluster.ts
      +const deletePod: Tool = {
      +  name: 'delete_pod',
      +  description: 'Delete a pod in an allowed namespace so its controller recreates it.',
      +  inputSchema: {
      +    type: 'object',
      +    properties: {
      +      namespace: { type: 'string' },
      +      pod: { type: 'string' },
      +    },
      +    required: ['namespace', 'pod'],
      +  },
      +  handler: async (params) => {
      +    const namespace = params.namespace as string;
      +    const pod = params.pod as string;
      +    if (!isPodDeletionAllowed(namespace)) {
      +      return notAllowedError(`Deleting pods in ${namespace}`);
      +    }
      +    await getCoreApi().deleteNamespacedPod(pod, namespace);
      +    return { success: true, message: `Deleted ${namespace}/${pod}` };
      +  },
      +};

