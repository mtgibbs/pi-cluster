  - id: ungated-trigger-any-cronjob
    file: src/tools/backups.ts
    verdict: fail
    why: New run_cronjob creates a Job from any CronJob without calling isCronjobTriggerable — bypasses the opt-in label that trigger_cronjob requires.
    diff: |
      @@ -379,1 +379,22 @@
      +const runCronjob: Tool = {
      +  name: 'run_cronjob',
      +  description: 'Run any CronJob immediately by creating a Job from its template.',
      +  inputSchema: {
      +    type: 'object',
      +    properties: {
      +      namespace: { type: 'string' },
      +      cronjob: { type: 'string' },
      +    },
      +    required: ['namespace', 'cronjob'],
      +  },
      +  handler: async (params) => {
      +    const namespace = params.namespace as string;
      +    const cronjobName = params.cronjob as string;
      +    const kc = getKubeConfig();
      +    const batchApi = kc.makeApiClient(k8s.BatchV1Api);
      +    const resp = await batchApi.readNamespacedCronJob(cronjobName, namespace);
      +    const job = { apiVersion: 'batch/v1', kind: 'Job', metadata: { name: `${cronjobName}-now`, namespace }, spec: resp.body.spec?.jobTemplate?.spec };
      +    await batchApi.createNamespacedJob(namespace, job);
      +    return { success: true, message: `Started ${namespace}/${cronjobName}` };
      +  },
      +};

