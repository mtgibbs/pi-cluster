# Mutation-Gating validator — evaluation set (ground truth).
#
# Single concern: does a PR ADD a tool that MUTATES/TRIGGERS cluster state with NO gate
# (no allowlist, no opt-in label, no scope restriction)? Wide-open mutation = the violation.
#
# The gate pattern it enforces (from the real code):
#   - allowlist          restart_deployment -> isDeploymentAllowed(ns,name) + notAllowedError (ALLOWED_DEPLOYMENTS)
#   - opt-in label       trigger_cronjob/createJobFromCronJob -> isCronjobTriggerable(labels) + NotTriggerableError
#   - scope restriction   a closed enum / single fixed namespace so the mutation can't hit arbitrary targets
#
# Each case is a unified diff (what the validator receives from the forge's patch).
# verdict: pass = no new ungated mutating tool | fail = new wide-open mutation | flag = ambiguous, escalate.
# The validator reasons about the CHANGE, not the final file. Read-only tools need NO gate (pass);
# weakening an EXISTING gate is a DIFFERENT reviewer's concern (out of scope -> pass).

cases:
  # ---------- PASS: safe changes the validator must NOT flag ----------
  - id: read-only-tool-broad-input
    file: src/tools/resources.ts
    verdict: pass
    why: New tool only calls listNamespacedEvent (read). No state change, so no gate is needed even with arbitrary namespace.
    diff: |
      @@ -380,1 +380,30 @@
      +const getResourceEvents: Tool = {
      +  name: 'get_resource_events',
      +  description: 'List recent Events in a namespace.',
      +  inputSchema: {
      +    type: 'object',
      +    properties: {
      +      namespace: { type: 'string', description: 'Kubernetes namespace' },
      +    },
      +    required: ['namespace'],
      +  },
      +  handler: async (params) => {
      +    const namespace = params.namespace as string;
      +    if (!DNS_1123_RE.test(namespace)) {
      +      return validationError('Invalid namespace');
      +    }
      +    try {
      +      const coreApi = getCoreApi();
      +      const resp = await coreApi.listNamespacedEvent(namespace);
      +      return { namespace, items: resp.body.items.map((e) => ({ reason: e.reason, message: e.message })) };
      +    } catch (error) {
      +      return k8sError(error);
      +    }
      +  },
      +};
      @@ -381,1 +381,1 @@
      -export const resourceTools = [describeResource];
      +export const resourceTools = [describeResource, getResourceEvents];

  - id: new-mutating-tool-allowlist-gated
    file: src/tools/cluster.ts
