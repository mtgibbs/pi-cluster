# no-false-green validator — evaluation set (ground truth).
#
# Single concern: does a change let a STATUS / DIAGNOSTIC / READER tool report
# success / healthy / ok / empty-but-fine when the underlying operation actually
# FAILED, ERRORED, or was SKIPPED? Grounded in the real get_*/status/diagnose tools
# in src/tools/ and the helpers in src/clients/* (pihole catch{return[]},
# media.ts every([]) health booleans, the honest pihole getStatus counter-example).
#
# Each case is a unified diff (what the validator receives from the forge's patch).
# verdict: pass = failures surface honestly (or the change removes a false-green / does
#          not touch a failure path) | fail = a failure can now read as green | flag =
#          cannot prove the failure surfaces, escalate.
#
# Precision traps (must stay PASS): an honest error-returning catch; a log-and-RETHROW
# catch (looks like a swallow, actually propagates); the FIX that REPLACES a swallow with
# an error return; a genuine empty result on a successful fetch; output-shaping refactors.

cases:
  # ---------- PASS: failures surface honestly ----------
  - id: honest-error-return
    file: src/tools/secrets.ts
    verdict: pass
    why: get_secrets_status's new catch returns k8sError(error) — the failure reaches the caller as error:true, not a healthy/empty shape.
    diff: |
      @@ -38,9 +38,13 @@ const getSecretsStatus: Tool = {
         handler: async () => {
      +    try {
             const secrets = await listExternalSecrets();
             return {
               externalSecrets: secrets,
               total: secrets.length,
             };
      +    } catch (error) {
      +      return k8sError(error);
      +    }
           },

  - id: log-and-rethrow
    file: src/clients/pihole.ts
    verdict: pass
    why: the new catch LOGS then rethrows — the failure still propagates to the caller, it is not swallowed into an empty result.
    diff: |
      @@ -337,11 +337,15 @@ export async function getRecentQueries(count = 100): Promise<string[][]> {
      +  try {
             const response = await piholeFetch<QueriesResponse>(`queries?length=${count}`);
             return (response.queries || []).map((q) => [
               String(q.time), q.type, q.domain, q.client, q.status,
             ]);
      +  } catch (e) {
      +    console.error('[pihole] getRecentQueries failed', e);
      +    throw e;
      +  }
         }

  - id: remove-the-swallow-fix
    file: src/clients/pihole.ts
    verdict: pass
    why: the FIX — replaces a swallowing `catch { return [] }` with an error-returning catch. Removing a false-green is the opposite of introducing one.
    diff: |
      @@ -319,11 +319,11 @@ export async function getWhitelist(): Promise<PiholeDomainEntry[]> {
           try {
             const response = await piholeFetch<DomainsResponse>('domains/allow');
             return (response.domains || []).map((d) => ({ ...d }));
      -    } catch {
      -      return [];
      -    }
      +    } catch (e) {
      +      throw new Error(`Pi-hole whitelist fetch failed: ${e instanceof Error ? e.message : e}`);
      +    }
         }

  - id: guarded-every-health
    file: src/tools/media.ts
    verdict: pass
    why: the health boolean is guarded — an empty pod list explicitly returns healthy:false with an error, so a vanished workload can no longer read as healthy.
    diff: |
      @@ -41,9 +41,16 @@ const getMediaStatus: Tool = {
             const jellyfin = jellyfinPods.map(formatPod);
      +      if (jellyfin.length === 0) {
      +        return { jellyfin: { pods: [], healthy: false, error: 'no Jellyfin pods found' } };
      +      }
             const result: Record<string, unknown> = {
               jellyfin: {
                 pods: jellyfin,
                 healthy: jellyfin.every((p) => p.ready),
               },

  - id: genuine-empty-on-success
    file: src/tools/dns.ts
    verdict: pass
    why: get_pihole_queries returns an empty list only after a SUCCESSFUL fetch; the failure path is separate and surfaces error:true. Empty-on-success is honest.
    diff: |
      @@ -223,8 +223,12 @@ const getPiholeQueries: Tool = {
           const count = Math.min(Math.max((params.count as number) || 100, 1), 500);
      -    const queries = await getRecentQueries(count);
      -    return { total: queries.length, queries };
      +    try {
      +      const queries = await getRecentQueries(count);
      +      return { total: queries.length, queries };  // 0 here means genuinely no queries
      +    } catch (error) {
      +      return { error: true, message: `Pi-hole query log unavailable: ${String(error)}` };
      +    }
         }

  - id: output-shaping-refactor
    file: src/tools/logs.ts
    verdict: pass
    why: get_pod_logs adds a read-derived field and a line cap — pure output shaping; it does not touch any failure or empty path.
    diff: |
      @@ -98,9 +98,11 @@ const getPodLogs: Tool = {
             const logLines = output.split('\n').filter((l) => l.length > 0);
      +      const recent = logLines.slice(-lines);
             return {
               namespace, pod,
      -        lineCount: logLines.length,
      +        lineCount: recent.length,
               truncated,
      -        logs: output,
      +        logs: recent.join('\n'),
             };

  - id: improve-honest-message
    file: src/utils/errors.ts
    verdict: pass
    why: k8sError gains richer detail extraction — it was already an honest error path; a better message does not make any failure read as green.
    diff: |
      @@ -35,7 +35,9 @@ export function k8sError(error: unknown): { error: true; code: string; message:
      -  const message = error instanceof Error ? error.message : String(error);
      +  const body = (error as { response?: { body?: { message?: string } } })?.response?.body?.message;
      +  const message = body || (error instanceof Error ? error.message : JSON.stringify(error));
           return { error: true, code: 'K8S_ERROR', message };
         }

