  - id: stale-cache-fallback
    file: src/clients/pihole.ts
    verdict: flag
    why: getSummary now serves a module-level lastGoodStats on fetch failure with no staleness signal — a caller cannot tell a live success from a stale one masking a current outage (cached success is not proof). Escalate.
    diff: |
      @@ -231,4 +231,11 @@ export async function getSummary(): Promise<PiholeStats> {
      -  const stats = await piholeFetch<StatsResponse>('stats/summary', false);
      -  return convertStatsToLegacy(stats);
      +  try {
      +    const stats = await piholeFetch<StatsResponse>('stats/summary', false);
      +    lastGoodStats = convertStatsToLegacy(stats);
      +    return lastGoodStats;
      +  } catch {
      +    return lastGoodStats;  // serve last-known-good on failure
      +  }
         }
