  # ---------- PASS: precision traps (look mutable, are SAFE) ----------
  - id: existing-writer-improves-write
    file: src/tools/flux.ts
    verdict: pass
    why: >
      reconcile_flux ALREADY patches the CR — it was never read-only. Improving the existing
      patch annotation is not "introducing" a write to an observer. Out of this validator's scope.
    diff: |
      @@ -107,7 +107,8 @@ const reconcileFlux: Tool = {
