      +            'reconcile.fluxcd.io/forceAt': now,
                 },
               },
             };

  - id: new-standalone-writer-tool
    file: src/tools/cluster.ts
    verdict: pass
    why: >
      A brand-new writer tool (scale_deployment) is ADDED and exported alongside the readers.
      get_cluster_health is untouched and stays read-only — this is a new writer, not an
      observer turning mutable. (A different validator owns whether the new writer is gated.)
