      +  name: 'scale_deployment',
      +  description: 'Scale a whitelisted deployment to a replica count.',
      +  inputSchema: {
      +    type: 'object',
      +    properties: {
      +      namespace: { type: 'string' },
      +      deployment: { type: 'string' },
      +      replicas: { type: 'number' },
      +    },
      +    required: ['namespace', 'deployment', 'replicas'],
      +  },
      +  handler: async (params) => {
      +    const namespace = params.namespace as string;
      +    const deployment = params.deployment as string;
      +    if (!isDeploymentAllowed(namespace, deployment)) {
      +      return notAllowedError(`Scaling ${namespace}/${deployment}`);
      +    }
      +    await patchDeployment(namespace, deployment, { spec: { replicas: params.replicas } });
      +    return { success: true };
      +  },
      +};
      +
      -export const clusterTools = [getClusterHealth, restartDeployment];
      +export const clusterTools = [getClusterHealth, restartDeployment, scaleDeployment];

