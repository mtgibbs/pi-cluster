# read-only-integrity validator — evaluation set (ground truth).
#
# Single concern: does a change to a READ-ONLY tool (or a shared helper it calls)
# INTRODUCE a write / mutation / exec-of-a-mutating-command / delete path where there
# was none? Grounded in the real get_*/describe/list/diagnose tools in src/tools/ and
# the helpers in src/clients/* + src/utils/*.
#
# Each case is a unified diff (what the validator receives from the forge's patch).
# verdict: pass = read-only stays read-only (or writer stays writer) | fail = an observer
#          gains a write | flag = cannot prove the new path is read-only, escalate.
#
# Precision traps (must stay PASS): a tool that was ALREADY a writer changing its write;
# a read-only exec command swapped for another read-only command; a brand-new standalone
# writer tool exported alongside readers (a new writer, not a reader turning mutable).

cases:
  # ---------- PASS: read-only stays read-only ----------
