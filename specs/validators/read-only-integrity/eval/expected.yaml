    file: src/tools/cluster.ts
    verdict: pass
    why: get_cluster_health gains an extra read-derived output field; still only lists nodes/pods/events.
    diff: |
      @@ -52,6 +52,7 @@ const getClusterHealth: Tool = {
             return {
               nodes: nodeStatus,
               totalPods: pods.length,
      +        readyPods: pods.filter((p) => p.status?.phase === 'Running').length,
               problemPods,
               recentWarnings: warningEvents,
             };

